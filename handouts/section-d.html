  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css">

  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/monokai.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Roboto+Mono:wght@400;500;600;700&family=Roboto+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
/* ===============================================================
   CLI Reveal.js Theme — Civic Literacy Initiative
   ===============================================================
   Targets reveal.js selectors (.reveal .slides section).
   Uses pt for font sizes (PowerPoint convention).
   Loaded via <link> or embedded in template <style>.
   =============================================================== */

/* =========================
   CSS VARIABLES
   ========================= */
:root {
  /* Brand Colors */
  --cli-navy: #091A31;
  --cli-blue: #56ABE1;
  --cli-blue-light: #B6DEFF;
  --cli-blue-pale: #EBF6FF;
  --cli-white: #FFFFFF;
  --cli-red: #CC0000;
  --cli-gray: #888888;

  /* Extended palette (charts, diagrams) */
  --cli-purple: #6B4C9A;
  --cli-cyan: #2EC4B6;
  --cli-gold: #D4A843;

  /* Typography */
  --font-title: 'Roboto Mono', 'Courier New', monospace;
  --font-title-narrow: 'Roboto Condensed', Arial, sans-serif;
  --font-body: 'DM Sans', Arial, sans-serif;
  --font-code: 'Roboto Mono', monospace;

  /* Font sizes (pt) — designed for 1920×1080 reveal.js canvas */
  --fs-title-display: 76pt;
  --fs-title-section: 68pt;
  --fs-title-subsection: 72pt;
  --fs-title-slide: 36pt;
  --fs-body: 28pt;
  --fs-body-small: 22pt;
  --fs-footer: 14pt;
  --fs-code: 22pt;

  /* Spacing — asymmetric: more right padding for breathing room */
  --slide-padding: 72px 160px 72px 96px;
}

/* =========================
   BASE / RESET
   ========================= */
.reveal {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  color: var(--cli-navy);
}

/* display: flex is set via Reveal config (display: 'flex').
   center: false prevents reveal.js from injecting inline top offsets.
   Sections size to content by default — do NOT set height: 100% here
   as it triggers reveal.js's overflow stacking algorithm on content
   slides. Dark slide types (title, section, subsection) override with
   height: 100% individually since they have simple layouts that need
   full-viewport vertical positioning (margin-top: auto, justify-content).
   top: 0 anchors slides to the top — without it, position: absolute
   with top: auto places sections at their "static position", which
   shifts down based on preceding siblings in the DOM. */
.reveal .slides section {
  text-align: left;
  padding: var(--slide-padding);
  box-sizing: border-box;
  flex-direction: column;
  top: 0;
}

.reveal h1, .reveal h2, .reveal h3 {
  font-family: var(--font-title);
  font-weight: 700;
  text-transform: none;
  letter-spacing: 0;
  color: inherit;
}

/* =========================
   TITLE SLIDE
   ========================= */
.reveal .slides section.title-slide {
  background: var(--cli-navy);
  color: var(--cli-white);
  padding: 72px 96px;
  height: 100%;
}

.reveal .slides section.title-slide .url {
  font-family: var(--font-body);
  font-size: var(--fs-body-small);
  color: var(--cli-white);
  margin-top: auto;
  margin-bottom: 0;
}

.reveal .slides section.title-slide .title-logo {
  position: absolute;
  top: 48px;
  right: 64px;
  width: 280px;
  height: auto;
}

.reveal .slides section.title-slide .project-context {
  font-size: var(--fs-body);
  font-weight: 400;
  opacity: 0.8;
  margin: 0 0 8px 0;
}

.reveal .slides section.title-slide h1 {
  font-size: var(--fs-title-display);
  font-weight: 500;
  color: var(--cli-blue) !important;
  margin: 24px 0 32px 0;
  line-height: 1.35;
  max-width: 60%;
  letter-spacing: -0.03em;
  word-spacing: -0.15em;
}

.reveal .slides section.title-slide .subtitle {
  font-size: var(--fs-title-slide);
  font-weight: 400;
  color: var(--cli-white);
  opacity: 0.9;
  margin: 0;
}

/* =========================
   CONTENTS / TOC
   ========================= */
.reveal .slides section.toc-slide {
  background: var(--cli-white);
}

.reveal .slides section.toc-slide h2 {
  font-size: var(--fs-title-slide);
  color: var(--cli-navy);
  margin: 0 0 36px 0;
}

.reveal .slides section.toc-slide .toc-list {
  list-style: none;
  padding: 0;
  margin: 0;
  counter-reset: toc-item;
}

.reveal .slides section.toc-slide .toc-list li {
  counter-increment: toc-item;
  font-size: var(--fs-body);
  margin-bottom: 20px;
  padding-left: 2.2em;
}

.reveal .slides section.toc-slide .toc-list li::before {
  content: counter(toc-item, upper-roman) ".";
  color: var(--cli-blue);
  font-weight: 600;
  min-width: 40px;
  display: inline-block;
  position: absolute;
  left: 0;
}

/* =========================
   SECTION DIVIDER
   ========================= */
.reveal .slides section.section-slide {
  background: var(--cli-navy);
  color: var(--cli-white);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 96px;
  height: 100%;
}

.reveal .slides section.section-slide h1 {
  font-size: var(--fs-title-section);
  color: var(--cli-white);
  margin: 0;
  line-height: 1.15;
  max-width: 60%;
}

.reveal .slides section.section-slide .section-label {
  font-family: var(--font-body);
  font-size: var(--fs-body-small);
  color: var(--cli-blue);
  margin-bottom: 16px;
  display: block;
  font-weight: 400;
}

/* =========================
   SUB-SECTION DIVIDER
   ========================= */
.reveal .slides section.subsection-slide {
  background: var(--cli-navy);
  color: var(--cli-white);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 96px;
  height: 100%;
}

.reveal .slides section.subsection-slide .section-label {
  font-family: var(--font-body);
  font-size: var(--fs-body-small);
  color: var(--cli-white);
  opacity: 0.7;
  margin-bottom: 16px;
  display: block;
}

.reveal .slides section.subsection-slide h1 {
  font-family: var(--font-title-narrow);
  font-size: var(--fs-title-subsection);
  font-weight: 600;
  color: var(--cli-blue);
  margin: 0;
  line-height: 1.2;
  max-width: 60%;
}

/* =========================
   CONTENT SLIDE
   ========================= */
.reveal .slides section.content-slide {
  background: var(--cli-white);
  color: var(--cli-navy);
}

.reveal .slides section.content-slide h2 {
  font-size: var(--fs-title-slide);
  margin: 0 0 36px 0;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--cli-blue-light);
  display: flex;
  align-items: center;
  gap: 16px;
  margin-right: 96px;
}

.reveal .slides section.content-slide .chevron {
  color: var(--cli-blue);
  font-weight: 400;
}

/* Auto-insert chevron on content slide h2 (markdown-authored decks) */
.reveal .slides section.content-slide h2::before {
  content: "> ";
  color: var(--cli-blue);
  font-weight: 400;
}

/* Prevent double chevron when explicit <span class="chevron"> is present */
.reveal .slides section.content-slide h2:has(.chevron)::before {
  content: none;
}

.reveal .slides section.content-slide .content {
  flex: 1;
}

/* =========================
   PARAGRAPH SPACING
   ========================= */
.reveal .slides section p {
  margin: 0 0 24px 0;
}

.reveal .slides section p + ul,
.reveal .slides section p + ol {
  margin-top: 10px;
}

.reveal .slides section ul + p,
.reveal .slides section ol + p {
  margin-top: 28px;
}

/* =========================
   TWO-COLUMN LAYOUT
   ========================= */
.two-column {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  flex: 1;
}

.column-header {
  background: var(--cli-blue-light);
  padding: 12px 20px;
  font-weight: 600;
  font-size: var(--fs-body);
  margin-bottom: 20px;
}

/* Uneven splits */
.two-column.split-2-1 {
  grid-template-columns: 2fr 1fr;
}

.two-column.split-1-2 {
  grid-template-columns: 1fr 2fr;
}

/* =========================
   DATA / CHART SLIDE
   ========================= */
.reveal .slides section.data-slide {
  /* position: relative removed — the base section rule's position: absolute
     already serves as a containing block for the ::before triangle accent.
     Explicitly setting relative here fought with reveal.js's slide positioning
     and caused data slides to stack in normal flow instead of overlapping. */
}

/* Navy triangle accent — top-right corner */
.reveal .slides section.data-slide::before {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 0 120px 120px 0;
  border-color: transparent var(--cli-navy) transparent transparent;
  z-index: 0;
}

.data-layout {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: 40px;
  flex: 1;
  align-items: center;
}

.data-narrative {
  font-size: var(--fs-body);
  line-height: 1.5;
}

/* =========================
   LISTS
   ========================= */
.reveal .slides section ul,
.reveal .slides section ol {
  margin: 0;
  padding-left: 0;
  list-style: none;
}

.reveal .slides section ul li,
.reveal .slides section ol li {
  margin-bottom: 0.5em;
  font-size: var(--fs-body);
  line-height: 1.4;
  position: relative;
  padding-left: 1.6em;
}

.reveal .slides section ul li::before {
  content: ">";
  color: var(--cli-blue);
  font-family: var(--font-title);
  font-weight: 600;
  position: absolute;
  left: 0;
}

/* Arrow variant */
.reveal .slides section ul.arrow-list li::before {
  content: "\2192";
}

.reveal .slides section ol {
  counter-reset: item;
}

.reveal .slides section ol li::before {
  counter-increment: item;
  content: counter(item) ".";
  color: var(--cli-blue);
  font-family: var(--font-title);
  font-weight: 600;
  position: absolute;
  left: 0;
}

/* =========================
   TABLES
   ========================= */
.reveal .slides section table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--fs-body-small);
  margin: 28px 0 48px 0;
}

.reveal .slides section th {
  background: var(--cli-navy);
  color: var(--cli-white);
  padding: 20px 20px;
  text-align: left;
  font-weight: 600;
  font-family: var(--font-body);
}

.reveal .slides section td {
  padding: 20px 20px;
  border-bottom: 1px solid var(--cli-blue-light);
}

/* Alternate rows so the LAST body row is always blue-pale.
   Scoped to tbody tr so the thead row is unaffected.
   nth-last-child counts from the bottom: last = 1 (odd → blue). */
.reveal .slides section tbody tr:nth-last-child(odd) td {
  background: var(--cli-blue-pale);
}
.reveal .slides section tbody tr:nth-last-child(even) td {
  background: transparent;
}

/* Compact table variant — tighter row padding for dense tables */
.reveal .slides section .compact td,
.reveal .slides section .compact th {
  padding: 10px 20px;
}

/* =========================
   CALLOUTS & BOXES
   ========================= */
.callout {
  background: var(--cli-blue-pale);
  border-left: 4px solid var(--cli-blue);
  padding: 20px;
  margin: 20px 0;
  font-size: var(--fs-body);
}

.alert {
  background: #FFF0F0;
  border-left: 4px solid var(--cli-red);
  padding: 20px;
  margin: 20px 0;
  font-size: var(--fs-body);
}

/* =========================
   CODE
   ========================= */
.reveal .slides section code {
  font-family: var(--font-code);
  font-size: var(--fs-code);
  background: var(--cli-blue-pale);
  padding: 2px 6px;
  border-radius: 3px;
}

.reveal .slides section pre {
  background: var(--cli-navy);
  padding: 24px;
  border-radius: 4px;
  width: 100%;
  box-sizing: border-box;
}

.reveal .slides section pre code {
  background: transparent;
  color: var(--cli-white);
  padding: 0;
  font-size: var(--fs-code);
  line-height: 1.5;
}

/* =========================
   SCREENSHOT CONTAINER
   ========================= */
.screenshot-container {
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
  border: 1px solid var(--cli-blue-light);
  max-width: 85%;
  margin: 16px auto;
}

.screenshot-container img {
  display: block;
  width: 100%;
  height: auto;
}

/* Dark screenshot variant (for dark UI captures) */
.screenshot-container.dark {
  border-color: var(--cli-navy);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
}

/* Screenshot with caption */
.screenshot-caption {
  font-size: var(--fs-body-small);
  color: var(--cli-gray);
  text-align: center;
  margin-top: 8px;
}

/* =========================
   ANNOTATION OVERLAYS
   ========================= */
.annotated {
  position: relative;
  display: inline-block;
}

.annotation-circle {
  position: absolute;
  border: 3px solid var(--cli-red);
  border-radius: 50%;
  pointer-events: none;
}

.annotation-arrow {
  position: absolute;
  color: var(--cli-red);
  font-size: 24pt;
  pointer-events: none;
}

/* =========================
   DIAGRAM ELEMENTS
   ========================= */
.entity-card {
  border: 2px solid var(--cli-blue-light);
  border-radius: 4px;
  overflow: hidden;
  display: inline-block;
}

.entity-card .entity-header {
  background: var(--cli-blue);
  color: var(--cli-white);
  padding: 8px 14px;
  font-weight: 600;
  font-size: var(--fs-body-small);
}

.entity-card .entity-body {
  padding: 10px 14px;
  font-size: var(--fs-body-small);
}

/* =========================
   GLOBAL FOOTER
   ========================= */
/* Lives outside .slides, inside .reveal — always pinned to bottom.
   Reveal.js scales .slides via transform but the global footer sits
   in the same scaled coordinate space when placed inside .reveal. */
.global-footer {
  position: absolute;
  bottom: 40px;
  left: 56px;
  right: 56px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 20;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.global-footer .url {
  font-family: var(--font-body);
  font-size: var(--fs-footer);
  color: var(--cli-gray);
}

.global-footer .page-number {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-body);
  font-size: var(--fs-footer);
  color: var(--cli-gray);
  pointer-events: none;
}

.global-footer .footer-logo {
  width: 48px;
  height: auto;
}

/* Hide global footer on dark-background slides (title, section, subsection) */
.global-footer.hidden {
  opacity: 0;
}

/* =========================
   PER-SLIDE SOURCE OVERLAY
   ========================= */
/* Optional element inside a section for slide-specific metadata
   (e.g., "Source: EITI Reports 2023"). Sits at the bottom of the
   slide content, just above the global footer. Most slides omit this. */
.slide-source {
  font-family: var(--font-body);
  font-size: var(--fs-footer);
  color: var(--cli-gray);
  margin-top: auto;
  padding-top: 8px;
}

/* =========================
   FRAGMENTS (reveal.js)
   ========================= */
.reveal .slides section .fragment.highlight-blue.visible {
  color: var(--cli-blue);
}

/* =========================
   PRINT / PDF
   ========================= */
@media print {
  .reveal .slides section {
    page-break-inside: avoid;
  }
  .screenshot-container {
    box-shadow: none;
    border: 1px solid #ccc;
  }
}

  </style>
</head>

  <div class="slides">
    <section data-markdown data-separator="\n---\n" data-separator-notes="^Note:">

# 🎯 What Are We<br>Trying to Do

---

## Make data trustworthy

Make data trustworthy so that charts, maps, and arguments built on it are correct. These are the **Verify** and **Clean** steps of the pipeline.

<cli-pipeline highlight="Verify, Clean">Define, Find, Get, Verify, Clean, Analyse, Present</cli-pipeline>

Verification checks that the data is what you think it is. Cleaning fixes errors, standardises values, and consolidates categories. Both steps must happen before analysis, or every conclusion you draw could be wrong.

Note:
This is the largest section of the course because cleaning is where most of the real work happens. Students who rushed through cleaning produced maps and charts with wrong labels, double-counted events, and invisible countries. The pipeline makes this visible: if you skip Verify and Clean, Analyse and Present inherit every error silently.

---

<!-- .slide: class="section-slide" data-background-color="#091A31" -->
# 📚 What We Need<br>to Know

---

## Why cleaning matters

The FloodArchive dataset has:

- **5 ways to spell Philippines:** Philippines, Phillipines, Phillippines, Philipines, philippine
- **9 ways to say Heavy rain:** Heavy Rain, Heavy rain, heavy rain, Monsoonal rain, Monsoon, Torrential rain, Tropical storm, Brief torrential rain, Rain

Each spelling variant becomes a separate category in a chart or filter. A bar chart of flood causes shows 9 bars instead of 3. A country filter misses events because the name doesn't match. A COUNTIF formula returns 12 instead of 47.

Messy data does not produce errors. It produces **wrong answers that look right**.

Note:
This is the opening example from the crash course cleaning session. Students opened the FloodArchive CSV and immediately saw the problem when they sorted the Country column. The point: messy data silently corrupts analysis. It doesn't crash; it lies.

---

## Who is invisible?

After designing your data table, ask: **what can't this data capture? Who is missing from the dataset?**

- Missing data is not the same as zero
- People sleeping rough but not in contact with services don't appear in homelessness data
- Communities in regions where no one is counting don't appear in disaster data
- Events that happened before systematic recording began don't appear in historical data

This is a critical question from Lecture 1. It applies at every stage, but it matters most during verification: when you look at the data, ask who and what is **not** in it.

Note:
Callback to Lecture 1. This question shaped several students' proposals: one group working on flood data in Southeast Asia realised that rural communities without internet access were systematically underrepresented in crowdsourced datasets. The absence of data is itself data.

---

## Eight principles keep your cleaning auditable

<div class="compact">

| # | Principle | Why |
|---|-----------|-----|
| 1 | **Never modify originals** | Keep the raw file untouched. Work on a copy. |
| 2 | **Never let AI modify content directly** | AI can write formulas and scripts. It should not edit cell values. |
| 3 | **Look at the data yourself** | Sort, scroll, spot-check. Build intuition for what's wrong. |
| 4 | **Create new columns, don't overwrite** | Keep originals alongside cleaned versions for comparison. |
| 5 | **One problem at a time** | Fix spelling first. Then categories. Then missing values. |
| 6 | **Right tool for the job** | Sheets for transparency, OpenRefine for scale, scripts for automation. |
| 7 | **Document every decision** | Why did you merge these categories? Write it down. |
| 8 | **Verify after each step** | Check the result before moving to the next problem. |

</div>

Note:
Principles 1-2 are the most important. Modifying originals means you can't undo mistakes. Letting AI modify content directly means you can't verify what changed. The rest are workflow discipline. Students who followed "one problem at a time" finished cleaning faster than those who tried to fix everything at once.

---

## When to use which tool

<div class="two-column">
<div class="column">
<div class="column-header">Google Sheets</div>

- Under ~50,000 rows
- You want to **see every step** happening
- Formulas are transparent and auditable
- Best for learning and small datasets
- Good for collaborative work (share the sheet)

</div>
<div class="column">
<div class="column-header">OpenRefine</div>

- Any dataset size (handles millions of rows)
- **Bulk standardisation** of messy categories
- Clustering algorithms find similar values automatically
- Every action is recorded and undoable
- Best for repetitive, large-scale cleaning

</div>
</div>

**Scripts** (Python, R) are best for automated pipelines that run repeatedly. For one-off cleaning in this course, Sheets and OpenRefine cover everything.

Note:
The decision heuristic: if you need to see and understand every change, use Sheets. If you have thousands of messy values to standardise, use OpenRefine. If the cleaning needs to run again next month on new data, write a script. Most students in the crash course used Sheets for everything under 5,000 rows.

---

## Data format shapes what you can ask

The FloodArchive stores multi-country floods as **one row** with an OtherCountry column:

<cli-csv file="flood-row.csv">
ID, Country, OtherCountry, Date, Dead
4567, Brazil, "Argentina, Paraguay", 2019-03-15, 12
</cli-csv>

A more expressive format would be **hierarchical**: each country gets its own record with country-specific dates and impacts. But CSV is flat: one row, one record.

When you encounter limitations in your data, ask: **is this a data quality problem or a data modeling problem?** The Philippines misspellings are data quality. The OtherCountry column is data modeling. Different problems need different solutions.

Note:
This distinction matters because students sometimes tried to "clean" structural limitations out of the data. You can't fix the OtherCountry problem with TRIM or Find-and-Replace. You'd need to restructure the data: one row per country-event pair. That's a modeling decision, not a cleaning task. JSON or a relational database would handle this naturally; CSV forces it into a single field.

# 🔧 How Do We Do It

---

## Three methods get external data into Sheets

Three methods:

**1. IMPORTDATA formula** — pulls live data from a URL directly into the sheet:
```
=IMPORTDATA("https://example.com/data.csv")
```
The data updates when the URL changes. Useful for APIs and live datasets.

**2. Upload CSV** — File → Import → Upload. Google Sheets asks which separator to use: comma, semicolon, or tab. If the data looks wrong (everything in one column), try a different separator.

**3. Paste special (values only)** — if you have formula-generated data (from IMPORTDATA or calculations), copy it and use Edit → Paste special → Values only. This detaches the values from formulas so you can edit them freely.

Note:
IMPORTDATA is the fastest way to get CSV data into Sheets. But it creates a live link: if you edit the imported cells, they revert on refresh. That's why Paste Special matters: it converts formula results into plain values you can modify. Students who forgot this step lost their cleaning work when the sheet refreshed.

---

## Explore before you clean

Before cleaning, explore:

- **Sort columns** to see what values exist. Sort the Country column alphabetically and scan for near-duplicates.
- **Filter** to isolate subsets. Filter Country = "Philippines" (but you'll miss "Phillipines").
- **Scroll** through the data. AI reads the first 50 rows carefully and assumes the rest are similar. You need to check the middle and end.

**Pivot tables** for quick summaries: Insert → Pivot table. Set Rows = the column you want to group by, Values = COUNTA (counts non-empty cells). A pivot table on Country immediately shows you all 5 Philippines variants and their counts.

**Conditional formatting** with a colour scale on numeric columns reveals visual patterns: outliers, clusters, and gaps.

Note:
The pivot table is the most powerful exploration tool in Sheets. Students who built a pivot table on the Cause column immediately saw the 9 variants of Heavy Rain. Without it, they would have had to scroll through 4,000 rows. COUNTA counts non-empty cells; SUM adds up numbers. Choosing SUM when you want counts is a common error (see Q&A slide on common errors).

---

## Cleaning: filter and overwrite

A controlled alternative to Find and Replace:

1. Click the column filter dropdown
2. Uncheck "Select all," then check only the wrong value (e.g., "Phillipines")
3. The sheet now shows only rows with that value
4. Select the visible cells in that column
5. Type the correct value ("Philippines") and press **Ctrl+Enter** (fills all selected cells)
6. Remove the filter to see all rows again

This is safer than Find and Replace because you **see exactly which rows will change** before changing them. Find and Replace can modify values inside longer strings unexpectedly.

Note:
From Day 3. Students used this technique to fix the Philippines variants one by one. The visual confirmation (seeing only the filtered rows) prevents accidents. Find and Replace is dangerous when your search term appears inside other values: replacing "rain" could affect "Torrential rain" if you're not careful with the scope.

---

## Cleaning: invisible spaces

Google Sheets catches **trailing** spaces with its automated suggestion ("Did you mean Philippines?"). But it misses **leading** spaces.

The TRIM function removes both leading and trailing spaces:

<sheets-string-surgery
  before=" Philippines "
  target=" "
  after="Philippines">
</sheets-string-surgery>

**Workflow:** create a helper column with `=TRIM(A2)`, drag down, copy the column, paste as values over the original, delete the helper column.

Why it matters: `" Philippines"` and `"Philippines"` look identical on screen but are different values to formulas. COUNTIF, FILTER, and pivot tables all treat them as separate categories.

Note:
This was one of the trickiest issues in the crash course. A student had 3 apparent duplicates in their pivot table that looked identical. Selecting the cells and checking the formula bar revealed leading spaces. TRIM is the standard fix. The helper column workflow preserves the original until you verify the result.

---

## Categorisation with FILTER lookup

When many raw values map to a few categories, use a **mapping sheet**:

1. In a new sheet ("Mapping"), use `=UNIQUE(Data!E:E)` to list all distinct values from the Cause column
2. Sort the list alphabetically
3. Manually assign a category to each value in an adjacent column (e.g., "Heavy Rain" → "Rain", "Monsoonal rain" → "Rain")
4. Back in the data sheet, use FILTER to look up the category:

<sheets-merge
  table-a="Data" key-a="MainCause"
  cols-a='["Country","Dead"]'
  rows-a='[["Heavy Rain","Algeria","26"],["Monsoonal rain","Bangladesh","43"]]'
  table-b="Mapping" key-b="original"
  cols-b='["category"]'
  rows-b='[["Heavy Rain","Rain"],["Monsoonal rain","Rain"],["Dam break","Dam"]]'
  pull="category">
</sheets-merge>

Formula: `=FILTER(Mapping!B:B, Mapping!A:A = E2)`. Transparent: anyone can open the Mapping sheet and see every decision.

Note:
This is the recommended approach for the crash course because it is fully auditable. Every mapping decision is visible in the Mapping sheet. If someone asks "why did you classify Monsoonal rain as Rain?", you point to the sheet. The FILTER function here acts as a lookup: given a raw value, return its assigned category.

---

## Categorisation with IFS and SEARCH

An alternative for pattern-based categories. SEARCH finds text within a cell:

```
=IFS(
  IFERROR(SEARCH("rain", E2), 0),  "Rain",
  IFERROR(SEARCH("storm", E2), 0), "Storm",
  IFERROR(SEARCH("snow", E2), 0),  "Snow",
  TRUE,                             "Other"
)
```

**The gotcha:** SEARCH returns an **error** when it doesn't find the text, not FALSE. This blocks the entire IFS chain. IFERROR wraps each SEARCH to convert the error to 0 (falsy), letting IFS proceed to the next condition.

Without IFERROR: the formula crashes on the first non-match.
With IFERROR: the formula tests each pattern in order and falls through to "Other."

Note:
This is a common source of confusion. Students expect SEARCH to return TRUE/FALSE like a boolean check, but it returns the position number (e.g., 7) on match and #VALUE! error on no match. IFERROR(SEARCH(...), 0) converts this to: position number (truthy) on match, 0 (falsy) on no match. IFS evaluates each condition and picks the first truthy one.

---

## Zero and blank mean different things

The OtherCountry column contains three kinds of values:

- **0** — no other country affected
- **Blank** — unknown or not recorded
- **Country names** — "Argentina, Paraguay"

Create a helper column to classify each row:

<sheets-branch
  test='= 0 or "0" ?'
  inputs='["0", "", "Argentina", "0", "Paraguay"]'
  yes="Single country"
  no="Check if blank → Unknown, else Multi-country">
</sheets-branch>

Formula: `=IF(OR(A2=0, A2="0"), "Single country", IF(A2="", "Unknown", "Multi-country"))`. Alternative with IFS (flatter): `=IFS(OR(A2=0, A2="0"), "Single country", A2="", "Unknown", TRUE, "Multi-country")`

Note:
The 0 vs blank distinction is critical. In the FloodArchive, 0 means "no other country" (a positive assertion), while blank means "we don't know" (absence of information). Treating both the same would hide the difference between "this flood affected only one country" and "we have no information about other countries." Students who ignored this distinction miscounted multi-country events.

---

## Validating with the REST Countries API

Multi-country flood events: do the paired countries actually share a border?

- Brazil + Argentina → **plausible** (shared border)
- Brazil + Vietnam → **suspicious** (no shared border)

The REST Countries API has a `borders` field listing each country's neighbours by ISO code:

```
https://restcountries.com/v3.1/name/brazil?fields=borders
→ ["ARG", "BOL", "COL", "GUF", "GUY", "PRY", "PER", "SUR", "URY", "VEN"]
```

This is geographic knowledge that formulas can't provide. You need an external data source. Use OpenRefine's "Add column by fetching URLs" feature or write a script that checks each country pair against the API.

Note:
From Day 3. One student found a flood event listing Brazil and Vietnam as co-affected countries. The API confirmed they don't share a border, flagging this as a likely data entry error (probably two separate events merged into one row). This is a good example of using an API for verification, not just data retrieval.

---

## Extract the year with LEFT

The LEFT function extracts characters from the start of a text string:

<sheets-string-surgery
  before="1985-01-01"
  target="-01-01"
  after="1985">
</sheets-string-surgery>

Formula: `=LEFT(A2, 4)` extracts the first 4 characters, giving you the year from an ISO date string. Useful when you need to group events by year but the date column contains full dates.

**Helper column workflow:** create a "Year" column with `=LEFT(A2, 4)`, drag down. Now you can pivot by year, filter by decade, or chart trends over time.

Note:
LEFT treats the cell as text and returns characters by position. It does not understand dates. If your dates are stored as actual date values (not text), use =YEAR(A2) instead. In the FloodArchive, dates are stored as text strings in ISO format, so LEFT works correctly.

## Three clustering algorithms find different problems

<div class="compact">

| Algorithm | What it finds | Example |
|-----------|--------------|---------|
| **Key collision** | Duplicates after normalisation (case, whitespace) | "Heavy Rain" = "heavy rain" |
| **Nearest neighbour** | Near-matches by edit distance | "Philippines" ≈ "Phillipines" |
| **Phonetic (Metaphone)** | Words that sound alike | "Fillipines" ≈ "Philippines" |

</div>

Note:
From Day 3. Students who only ran key collision missed the "Phillipines" misspelling (one letter difference). Nearest neighbour caught it. Phonetic caught creative misspellings.

## OpenRefine: advanced features

Beyond text facets and clustering:

- **Timeline facet** on date columns → filter by date range using a slider. Useful for identifying time periods with sparse or suspicious data.
- **Trim whitespace** → Edit cells → Common transforms → Trim leading and trailing whitespace. Bulk version of the Sheets TRIM approach.
- **Fetch URLs** → Add column by fetching URLs. Send API requests for each row (e.g., REST Countries API for border validation). Rate-limited automatically.
- **Parse JSON** → use GREL `parseJson()` to extract fields from API responses into new columns.
- **GREL substring** → `value[0,4]` extracts the first 4 characters (like LEFT in Sheets).

Note:
OpenRefine's "fetch URLs" feature is powerful but slow: it sends one request per row with a configurable delay. For 4,000 rows at 500ms delay, that's 33 minutes. Filter down to only the rows you need to validate before fetching. GREL (General Refine Expression Language) is OpenRefine's formula language. It's different from Sheets formulas but serves the same purpose.

## Prompt: asking AI for formula syntax

<cli-highlight-prompt>
{objective}I need to cluster similar values in a text column in OpenRefine.{/objective} {output}Walk me through the steps to apply nearest-neighbour clustering.{/output} {reasoning}I'm a beginner using OpenRefine for the first time.{/reasoning}
</cli-highlight-prompt>

<cli-highlight-prompt>
{objective}I have a column with dates in "YYYY-MM-DD" format in OpenRefine.{/objective} {output}What GREL expression extracts just the year?{/output}
</cli-highlight-prompt>

Use the **chatbot** for syntax questions like these. Save CLI tokens for tasks that need to touch your files.

Note:
AI is excellent at formula and syntax recall. This is a good example of "what function would I use?" rather than "do it for me." The AI gives you the syntax; you apply it yourself and verify the result. This builds your skill while saving time on memorisation.

---

## Paste as values before exporting

After cleaning, prepare the data for analysis:

1. Create a **new sheet** in the same workbook
2. Copy only the **columns you need** for analysis (original + cleaned columns)
3. **Paste as values** (Edit → Paste special → Values only) to detach from formulas
4. Review the result: are all cleaning formulas resolved to final values?
5. **Download as CSV** (File → Download → Comma-separated values)
6. Upload the CSV to your Codespace for scripting and map-building

Why a separate sheet: your cleaning sheet has helper columns, formulas, and intermediate steps. Your analysis needs a clean, flat CSV with only the final values.

Note:
This step is often forgotten. Students who tried to use the cleaning sheet directly for analysis ran into problems: helper columns cluttering the data, formulas breaking when rows were deleted, IMPORTDATA refreshing and overwriting edits. The reduced CSV is the artifact that enters the Analyse step of the pipeline.

<!-- .slide: class="section-slide" data-background-color="#091A31" -->
# 💡 Why We Did It<br>Like This

---

## Trust the code, not the reasoning

Scripts are deterministic: the same script on the same data produces the same result every time. AI can write scripts that filter rows, create columns, and convert formats. These are trustable because they are testable.

But AI should never directly edit data content. If the logic can't be expressed as a formula or script, do it manually.

**Exception:** AI writing a formula inside a spreadsheet cell IS trustable. You see the result immediately in the cell and can verify it in place. The formula `=TRIM(A2)` does exactly one thing, and you can check whether the output is correct by looking at it.

Note:
Callback to Foundations. The formula exception is important because it distinguishes between "AI writes code that processes data" (the script is the artifact, testable) and "AI edits cell values directly" (no artifact, no audit trail). A formula is visible, inspectable, and deterministic. An AI editing cells behind the scenes is none of these.

---

## Build good taste in data

Manual spreadsheet work develops intuition for what right data looks like:

- Sort the column. Scroll through. Does anything stand out?
- Check the min and max. Do they make sense?
- Count the categories. Are there too many?

If you rely on AI to do all the data work, you will never develop this judgment. You won't notice when "Dead = 0" could mean zero deaths or unknown. You won't catch that a country column has 47 unique values when only 30 countries are in the dataset.

AI gets lazy with large files: it reads the first 50 rows carefully, then assumes the rest are similar. **Verify values near the end of outputs, not just the top.**

Note:
Callback to Foundations. This is why we do manual spreadsheet exercises even when AI could do them faster. You are building judgment, not just producing output. The "AI laziness" pattern is real: students who trusted AI-generated cleaned data without scrolling to the bottom found errors in rows 500+ that the AI had processed by pattern-matching from the top.

---

## Core vs peripheral competencies

<div class="two-column">
<div class="column">
<div class="column-header">Core (build skill here)</div>

- Data cleaning and validation
- Formula logic and spreadsheet work
- Judging whether results make sense
- Understanding what the data represents
- Deciding how to categorise values

</div>
<div class="column">
<div class="column-header">Peripheral (AI handles well)</div>

- Remembering GREL syntax
- Writing HTML and CSS
- Memorising git commands
- Producing visual polish
- Recalling function names

</div>
</div>

Best AI use for formulas: ask **"what function would I use for this?"** not "do it for me." You apply the function, verify the result, and build the skill.

Note:
Callback to Foundations. In the cleaning context, this means: learn to read a FILTER formula and understand what it does. Don't memorise the exact syntax. When you need it, ask AI for the syntax, then apply it yourself. The judgment of whether the result is correct is yours, and you can only build that judgment by doing the work.

# ❓ Q&A

---

## Data cleaning involves ethical choices

Cleaning is not neutral. Decisions about categories are decisions about how to represent the world:

- **Scotland/UK:** do you list Scotland as a separate country or merge it into the UK? Depends on whether your analysis is about political entities or geographic regions.
- **USSR/Russia:** historical data may list the USSR. Do you reclassify as Russia? You lose the Baltic states, Ukraine, and 12 other countries.
- **Palestine/Gaza:** naming and boundary decisions carry political weight.

There is no correct answer. The correct practice is to **document your reasoning** so that anyone reviewing your data understands the choice you made and why.

Note:
From the crash course Q&A. This came up when a student working on historical disaster data had events listed under "USSR." Converting to "Russia" would mean attributing Chernobyl (Ukraine) to Russia. The student chose to keep the original values and add a note column explaining the historical context. That's good practice.

---

## Common errors

**SUM vs COUNTA in pivot tables:** SUM adds up numbers. COUNTA counts non-empty cells. If you want "how many flood events per country," use COUNTA. SUM would add up the Dead column instead of counting rows.

**Semicolons vs commas as formula delimiters:** Google Sheets uses your locale settings. In most European locales, formulas use semicolons: `=IF(A2>0; "Yes"; "No")`. In English locales, commas: `=IF(A2>0, "Yes", "No")`. If a formula doesn't work, check your delimiter.

**Google Sheets limits:** maximum ~10 million cells. Performance degrades noticeably above ~100,000 rows. For larger datasets, use OpenRefine or scripts.

Note:
The SUM/COUNTA confusion was the most common pivot table error in the crash course. Students set Values to SUM(Country), which either returned 0 (text can't be summed) or summed a numeric column they didn't intend. COUNTA counts any non-empty cell regardless of type, which is almost always what you want when counting records.

---

## When to clean in the pipeline

<cli-pipeline highlight="Verify, Clean">Define, Find, Get, Verify, Clean, Analyse, Present</cli-pipeline>

Clean after Get, before Analyse. But the pipeline is iterative:

- **Verify** may reveal the data is unsuitable → go back to **Find** for a better source
- **Clean** may reveal structural problems → reconsider your **Define** (maybe your question can't be answered with this data)
- **Analyse** may reveal patterns that look wrong → go back to **Clean** to investigate

The pipeline is a living process. Returning to an earlier step is a feature, not a failure. Document each iteration so you can retrace your path.

Note:
From Lecture 3. The iterative nature of the pipeline was evident during the crash course: students who cleaned their data and then started analysis often discovered new problems (e.g., a country with only 2 events when neighbouring countries had 200, suggesting missing data rather than actual low frequency). That sent them back to Verify and sometimes back to Find.

---

## The ambiguity of zero

In the FloodArchive:

- **Dead = 0** could mean zero deaths, or unknown (no one counted)
- **GlideNumber = 0** is a missing ID, not a real identifier
- **Displaced = 0** might mean no displacement, or the source didn't report it

You must decide how to handle each case and **document the decision**. If you treat 0-as-unknown the same as 0-as-zero, your averages will be wrong (dragged down by false zeros). If you exclude all zeros, you lose genuine zero-death events.

There is no universal rule. The right choice depends on what you use the data for.

Note:
This is a fundamental data quality issue. The FloodArchive does not distinguish between "zero deaths confirmed" and "death count not available." Students who computed average deaths per flood without addressing this got artificially low numbers because hundreds of events with unknown death counts were treated as zero. The fix: decide on a convention, apply it consistently, and document it in your methodology.

<script>
/**
 * <cli-csv> — Hand-drawn CSV file diagram with cropped-document feel.
 *
 * Renders tabular data as a sketched spreadsheet with wobbly hand-drawn
 * grid lines and crisp text. The top shows a file tab; the bottom fades
 * out with a gradient mask, suggesting the data continues beyond view.
 *
 * Usage in markdown:
 *   <cli-csv file="commitments.csv" wrap="1,5">
 *     id, commitment, actor, amount, timeline, quote
 *     1, Infrastructure programme, Gov of SA, R1 trillion, 3 years, "invest over R1 trillion…"
 *   </cli-csv>
 *
 * Attributes:
 *   file  — optional filename label shown in the file tab (gray, monospace)
 *   wrap  — comma-separated column indices (0-based) that wrap text instead
 *           of clipping with ellipsis. Wrapped columns grow row height to fit.
 *           Omitted = all columns clip.
 *
 * Text content:
 *   One line per row, comma-separated. First line becomes the header row.
 *   Supports basic quoted strings (commas inside quotes are preserved).
 */
class CliCsv extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['file', 'wrap'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _parseLine(line) {
    const cells = [];
    let current = '';
    let inQuotes = false;
    for (const ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; current += ch; }
      else if (ch === ',' && !inQuotes) { cells.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    cells.push(current.trim());
    return cells;
  }

  // Seeded pseudo-random for consistent wobble across renders
  _srand(seed, i) {
    const x = Math.sin(seed * 127.1 + i * 311.7) * 43758.5453;
    return (x - Math.floor(x)) * 2 - 1; // -1 to 1
  }

  // Draw a wobbly line as an SVG path with quadratic bezier segments
  _wobbleLine(x1, y1, x2, y2, seed, wobbleAmt) {
    const segments = 5;
    const dx = (x2 - x1) / segments;
    const dy = (y2 - y1) / segments;
    const w = wobbleAmt || 4;

    let d = `M${x1.toFixed(1)},${y1.toFixed(1)}`;
    for (let i = 1; i <= segments; i++) {
      const endX = x1 + dx * i + (i < segments ? this._srand(seed, i) * w * 0.3 : 0);
      const endY = y1 + dy * i + (i < segments ? this._srand(seed, i + 50) * w * 0.3 : 0);
      const cpX = x1 + dx * (i - 0.5) + this._srand(seed, i + 100) * w;
      const cpY = y1 + dy * (i - 0.5) + this._srand(seed, i + 150) * w;
      d += ` Q${cpX.toFixed(1)},${cpY.toFixed(1)} ${endX.toFixed(1)},${endY.toFixed(1)}`;
    }
    return d;
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const lines = raw.split('\n').map(s => s.trim()).filter(Boolean);
    const rows = lines.map(line => this._parseLine(line));
    const numCols = Math.max(...rows.map(r => r.length));
    const numRows = rows.length;

    const filename = this.getAttribute('file') || '';
    const seed = 42; // fixed seed for consistent wobble

    // Parse wrap attribute: comma-separated 0-based column indices
    const wrapAttr = this.getAttribute('wrap') || '';
    const wrapCols = new Set(wrapAttr.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n)));

    // Column widths: proportional to max content, with minimum for headers
    const colMaxChars = [];
    for (let c = 0; c < numCols; c++) {
      let max = 0;
      for (const row of rows) {
        const len = (row[c] || '').length;
        if (len > max) max = len;
      }
      colMaxChars.push(Math.max(max, 4));
    }
    const paddedChars = colMaxChars.map(c => c + 3);
    const totalChars = paddedChars.reduce((a, b) => a + b, 0);

    // Layout — generous sizing for slide readability
    const cellPadX = 18;
    const baseCellH = 58;
    const fileTabH = 44;
    const fadeH = 36;
    const insetX = 8;       // horizontal inset so wobble on left/right borders stays visible
    const gridW = Math.max(800, totalChars * 13);
    const totalW = gridW + insetX * 2;
    const colWidths = paddedChars.map(c => (c / totalChars) * gridW);
    const gridTop = fileTabH;

    // Estimate row heights — wrapped columns may need taller rows
    // approx chars per line = (colWidth - 2*cellPadX) / 10 (rough char width at 16pt mono)
    const rowHeights = [];
    for (let r = 0; r < numRows; r++) {
      let maxH = baseCellH;
      for (let c = 0; c < numCols; c++) {
        if (!wrapCols.has(c)) continue;
        const text = rows[r][c] || '';
        const availW = colWidths[c] - 2 * cellPadX;
        const charsPerLine = Math.max(1, Math.floor(availW / 10));
        const lineCount = Math.ceil(text.length / charsPerLine);
        if (lineCount > 1) {
          const neededH = lineCount * 26 + 20; // 26px per line + padding
          if (neededH > maxH) maxH = neededH;
        }
      }
      rowHeights.push(maxH);
    }

    // Cumulative Y offsets for each row
    const rowY = [gridTop];
    for (let r = 0; r < numRows; r++) {
      rowY.push(rowY[r] + rowHeights[r]);
    }
    const gridH = rowY[numRows] - gridTop;
    const totalH = gridTop + gridH + fadeH;

    // --- SVG wobbly grid lines ---
    let paths = '';
    const thin = 1.5;
    const thick = 2.5;

    const gL = insetX;           // grid left edge
    const gR = insetX + gridW;   // grid right edge

    // Top border
    paths += `<path d="${this._wobbleLine(gL, gridTop, gR, gridTop, seed + 1, 5)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Header separator
    const hSepY = rowY[1];
    paths += `<path d="${this._wobbleLine(gL, hSepY, gR, hSepY, seed + 2, 5)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Internal horizontal lines
    for (let r = 2; r <= numRows; r++) {
      const y = rowY[r];
      paths += `<path d="${this._wobbleLine(gL + 2, y, gR - 2, y, seed + r + 10, 4)}"
        fill="none" stroke="#091A31" stroke-width="${thin}" opacity="0.4"/>`;
    }

    // Left border
    paths += `<path d="${this._wobbleLine(gL + 1, gridTop, gL + 1, gridTop + gridH + fadeH, seed + 100, 4)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Right border
    paths += `<path d="${this._wobbleLine(gR - 1, gridTop, gR - 1, gridTop + gridH + fadeH, seed + 101, 4)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Internal vertical lines
    let x = gL;
    for (let c = 1; c < numCols; c++) {
      x += colWidths[c - 1];
      paths += `<path d="${this._wobbleLine(x, gridTop + 2, x, gridTop + gridH + fadeH, seed + c + 200, 3.5)}"
        fill="none" stroke="#091A31" stroke-width="${thin}" opacity="0.4"/>`;
    }

    // Header background (straight rect — wobble is on lines, not fills)
    const headerBg = `<rect x="${gL + 2}" y="${gridTop + 2}" width="${gridW - 4}" height="${rowHeights[0] - 3}"
      fill="#EBF6FF" rx="0"/>`;

    // --- Text cells (crisp, no filter) ---
    let cells = '';
    for (let r = 0; r < numRows; r++) {
      let cx = 0;
      for (let c = 0; c < numCols; c++) {
        const y = rowY[r];
        const h = rowHeights[r];
        const text = rows[r][c] || '';
        const isHeader = r === 0;
        const shouldWrap = wrapCols.has(c) && !isHeader;
        cells += `<div style="position:absolute; left:${cx + insetX}px; top:${y}px; width:${colWidths[c]}px; height:${h}px;
          display:flex; align-items:center; padding:0 ${cellPadX}px; box-sizing:border-box;
          font-family:'Roboto Mono',monospace; font-size:${isHeader ? '17pt' : '16pt'};
          font-weight:${isHeader ? '700' : '400'}; color:#091A31;
          overflow:hidden;${shouldWrap
            ? ' white-space:normal; word-break:break-word; line-height:1.4;'
            : ' white-space:nowrap; text-overflow:ellipsis;'}">${text}</div>`;
        cx += colWidths[c];
      }
    }

    // File tab label
    const fileLabel = filename
      ? `<div style="position:absolute; left:${insetX + 4}px; top:8px;
          font-family:'Roboto Mono',monospace; font-size:15pt; font-weight:600;
          color:#888; letter-spacing:0.02em;">${filename}</div>`
      : '';

    // Gradient mask: solid through data, fading at the bottom
    const solidPct = ((gridTop + gridH - fadeH) / totalH * 100).toFixed(0);

    // Wrap in a scaling container that shrinks the component to fit the slide
    const uid = Math.random().toString(36).slice(2, 8);
    const innerId = `csv-inner-${uid}`;
    const outerId = `csv-outer-${uid}`;

    this.innerHTML = `
      <div id="${outerId}" style="width:100%; margin:1em 0; overflow:visible;">
        <div id="${innerId}" style="position:relative; width:${totalW}px; height:${totalH}px;
          transform-origin:top left;
          -webkit-mask-image:linear-gradient(to bottom, black 0%, black ${solidPct}%, transparent 100%);
          mask-image:linear-gradient(to bottom, black 0%, black ${solidPct}%, transparent 100%);">
          <svg width="${totalW + 4}" height="${totalH + 4}"
            style="position:absolute; top:-2px; left:-2px; pointer-events:none; overflow:visible;">
            ${headerBg}
            ${paths}
          </svg>
          ${fileLabel}
          ${cells}
        </div>
      </div>
    `;

    // Scale to fit available space — may need to re-run when slide becomes visible
    const rescale = () => {
      const outer = document.getElementById(outerId);
      const inner = document.getElementById(innerId);
      if (!outer || !inner) return;
      const avail = outer.clientWidth;
      if (avail === 0) return; // slide still hidden, skip
      if (totalW > avail) {
        const scale = avail / totalW;
        inner.style.transform = `scale(${scale})`;
        inner.style.height = `${totalH * scale}px`;
      } else {
        inner.style.transform = '';
        inner.style.height = `${totalH}px`;
      }
    };

    requestAnimationFrame(rescale);

    // Re-measure when the container becomes visible or resizes.
    // ResizeObserver fires when the slide transitions from hidden (0 width)
    // to visible — works regardless of whether reveal.js has loaded yet.
    const ro = new ResizeObserver(() => requestAnimationFrame(rescale));
    ro.observe(document.getElementById(outerId));

    this._rendered = true;
  }
}

/**
 * <cli-fanout> — Fan-out/fan-in diagram showing parallel subagent delegation.
 *
 * Usage in markdown:
 *   <cli-fanout input="Main agent" output="Results merged">
 *     Subagent: scrape source A
 *     Subagent: scrape source B
 *     Subagent: clean existing data
 *   </cli-fanout>
 *
 *   <cli-fanout input="Main agent" output="Step 3: combine">
 *     Subagent: code chunk 1
 *     Subagent: code chunk 2
 *     Subagent: code chunk 3
 *   </cli-fanout>
 *
 * Attributes:
 *   input       — label for the left (source) box
 *   output      — label for the right (sink) box
 *   input-color — background for input box (default: "#56ABE1")
 *   output-color — background for output box (default: "#2EC4B6")
 *
 * Text content:
 *   One line per parallel task. Each becomes a middle box.
 */
class CliFanout extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['input', 'output', 'input-color', 'output-color'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const tasks = raw.split('\n').map(s => s.trim()).filter(Boolean);
    const inputLabel = this.getAttribute('input') || 'Input';
    const outputLabel = this.getAttribute('output') || 'Output';
    const inputColor = this.getAttribute('input-color') || '#56ABE1';
    const outputColor = this.getAttribute('output-color') || '#2EC4B6';

    // Unique IDs per instance
    const uid = Math.random().toString(36).slice(2, 8);

    // Layout constants
    const boxW = 220;
    const boxH = 80;
    const taskW = 360;
    const taskH = 56;
    const taskGap = 18;
    const arrowGap = 80;

    const n = tasks.length;
    const tasksBlockH = n * taskH + (n - 1) * taskGap;
    const totalH = Math.max(tasksBlockH, boxH) + 40;

    const inputX = 0;
    const inputY = (totalH - boxH) / 2;
    const taskX = boxW + arrowGap;
    const taskStartY = (totalH - tasksBlockH) / 2;
    const outputX = taskX + taskW + arrowGap;
    const outputY = (totalH - boxH) / 2;
    const totalW = outputX + boxW;

    // SVG arrow paths
    const inputCx = inputX + boxW;
    const inputCy = inputY + boxH / 2;
    const outputCx = outputX;
    const outputCy = outputY + boxH / 2;

    let arrows = '';
    for (let i = 0; i < n; i++) {
      const ty = taskStartY + i * (taskH + taskGap) + taskH / 2;

      // Fan-out: curved bezier from input to task
      const cp1 = arrowGap * 0.55;
      arrows += `<path d="M${inputCx},${inputCy} C${inputCx + cp1},${inputCy} ${taskX - cp1},${ty} ${taskX},${ty}"
        fill="none" stroke="#091A31" stroke-width="2.5" marker-end="url(#arr-${uid})"/>`;

      // Fan-in: curved bezier from task to output
      const tx2 = taskX + taskW;
      arrows += `<path d="M${tx2},${ty} C${tx2 + cp1},${ty} ${outputCx - cp1},${outputCy} ${outputCx},${outputCy}"
        fill="none" stroke="#091A31" stroke-width="2.5" marker-end="url(#arr-${uid})"/>`;
    }

    // Task boxes — light blue-pale fill, subtle rounded border
    const taskBoxes = tasks.map((t, i) => {
      const ty = taskStartY + i * (taskH + taskGap);
      return `<div style="position:absolute; left:${taskX}px; top:${ty}px; width:${taskW}px; height:${taskH}px;
        display:flex; align-items:center; justify-content:center;
        background:#EBF6FF; border:2.5px solid #B6DEFF; border-radius:10px;
        font-size:19pt; color:#091A31; text-align:center; padding:0 20px; box-sizing:border-box;">${t}</div>`;
    }).join('\n');

    // Endpoint boxes — solid color, rounded, white monospace text
    const renderBox = (x, y, color, label) => {
      return `<div style="position:absolute; left:${x}px; top:${y}px; width:${boxW}px; height:${boxH}px;
        display:flex; align-items:center; justify-content:center;
        background:${color}; border-radius:12px;
        font-family:'Roboto Mono',monospace; font-weight:600; font-size:21pt;
        color:white; text-align:center; white-space:pre-line; padding:0 20px; box-sizing:border-box;
        box-shadow:0 3px 12px rgba(9,26,49,0.12);">${label}</div>`;
    };

    this.innerHTML = `
      <svg width="0" height="0" style="position:absolute;">
        <defs>
          <marker id="arr-${uid}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#091A31"/>
          </marker>
        </defs>
      </svg>
      <div style="position:relative; width:${totalW}px; height:${totalH}px; margin:1em auto;">
        <svg width="${totalW}" height="${totalH}" style="position:absolute; top:0; left:0; pointer-events:none;">
          ${arrows}
        </svg>
        ${renderBox(inputX, inputY, inputColor, inputLabel)}
        ${taskBoxes}
        ${renderBox(outputX, outputY, outputColor, outputLabel)}
      </div>
    `;

    this._rendered = true;
  }
}

/**
 * <cli-heatmap> — Presence grid with column headers and row labels.
 *
 * Usage in markdown:
 *   <cli-heatmap columns="Define, Find, Get, Verify, Clean, Analyse, Present"
 *                highlight="Get, Clean">
 *     Human only:    ●, ●, ,  ●, ,  ●, ●
 *     AI can help:   ●, ●, ●, ●, ●, ●, ●
 *     AI can do it:  , ,  ●, ,  ●, ,
 *   </cli-heatmap>
 *
 * Attributes:
 *   columns    — comma-separated column header names
 *   highlight  — comma-separated column names to highlight (darker blue header)
 *   row-label-width — CSS width for the row label column (default: "200px")
 *
 * Text content:
 *   One line per row. Format: "Row Label: cell1, cell2, cell3, ..."
 *   Non-empty cells get a dot (●). Empty cells are blank.
 *   Dot color matches the column header color (highlighted or not).
 *
 * Row label colors cycle through the CLI palette:
 *   row 0 → navy (#091A31), row 1 → blue (#56ABE1), row 2 → gold (#D4A843),
 *   row 3 → purple (#6B4C9A), row 4 → cyan (#2EC4B6), then repeats.
 */
class CliHeatmap extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['columns', 'highlight', 'row-label-width'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const columns = (this.getAttribute('columns') || '').split(',').map(s => s.trim()).filter(Boolean);
    const highlightAttr = (this.getAttribute('highlight') || '').toLowerCase();
    const highlighted = new Set(highlightAttr.split(',').map(s => s.trim().toLowerCase()).filter(Boolean));
    const labelWidth = this.getAttribute('row-label-width') || '200px';

    // Parse rows from text content
    const rows = raw.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
      const colonIdx = line.indexOf(':');
      if (colonIdx < 0) return null;
      const label = line.substring(0, colonIdx).trim();
      const cells = line.substring(colonIdx + 1).split(',').map(c => c.trim());
      return { label, cells };
    }).filter(Boolean);

    const rowLabelColors = ['#091A31', '#56ABE1', '#D4A843', '#6B4C9A', '#2EC4B6'];
    const gap = '4px';

    // Column headers with downward caret
    const headers = columns.map(name => {
      const isHL = highlighted.has(name.toLowerCase());
      const bg = isHL ? '#56ABE1' : '#B6DEFF';
      const color = isHL ? 'white' : '#091A31';
      return `<div style="flex:1; display:flex; flex-direction:column; align-items:center;">
        <div style="background:${bg}; color:${color}; font-weight:600; font-size:24pt; padding:18px 0; width:100%; text-align:center; border-radius:6px 6px 0 0;">${name}</div>
        <div style="width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:14px solid ${bg};"></div>
      </div>`;
    }).join('\n');

    // Data rows
    const dataRows = rows.map((row, ri) => {
      const bgColor = rowLabelColors[ri % rowLabelColors.length];
      const isFirst = ri === 0;
      const isLast = ri === rows.length - 1;
      const labelRadius = isFirst ? 'border-radius:6px 0 0 0;' : isLast ? 'border-radius:0 0 0 6px;' : '';

      const cellsHtml = columns.map((col, ci) => {
        const val = (row.cells[ci] || '').trim();
        const isHL = highlighted.has(col.toLowerCase());
        const dotColor = isHL ? '#56ABE1' : '#091A31';
        const dot = val ? `<span style="color:${dotColor};">●</span>` : '';
        return `<div style="flex:1; background:#EBF6FF; padding:40px 0; text-align:center; font-size:28pt;">${dot}</div>`;
      }).join('\n');

      return `<div style="display:flex; gap:${gap}; margin-top:${gap};">
        <div style="flex:0 0 ${labelWidth}; background:${bgColor}; color:white; font-weight:600; font-size:24pt; display:flex; align-items:center; padding:0 24px; ${labelRadius}">${row.label}</div>
        ${cellsHtml}
      </div>`;
    }).join('\n');

    this.innerHTML = `
      <div style="width:92%; margin:1.2em auto 1.6em;">
        <div style="display:flex; gap:${gap};">
          <div style="flex:0 0 ${labelWidth};"></div>
          ${headers}
        </div>
        ${dataRows}
      </div>
    `;

    this._rendered = true;
  }
}

/**
 * <cli-highlight> — Generic text with colour-coded inline highlights and optional legend.
 *
 * Wraps text sections in pastel-coloured spans using curly-brace tags.
 * Colours and legend labels are defined via the `colors` attribute as
 * a pipe-separated list of "tag:label:#hex" entries.
 *
 * Usage in markdown:
 *   <cli-highlight colors="pro:Advantage:#4CAF50 | con:Disadvantage:#F44336 | note:Note:#FF9800">
 *     This tool has {pro}excellent performance{/pro} but {con}limited documentation{/con}.
 *     {note}A community guide exists.{/note}
 *   </cli-highlight>
 *
 * Attributes:
 *   colors    — pipe-separated definitions: "tag:Label:#hex | tag:Label:#hex"
 *               The hex colour is used at 0.3 opacity for highlights.
 *   no-legend — if present, hides the legend below the text
 *   no-quotes — if present, omits the guillemets around the text
 */
class CliHighlight extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  _render() {
    this._rendered = true;

    const colorDefs = (this.getAttribute('colors') || '').split('|').map(s => s.trim()).filter(Boolean);
    const tags = {};

    for (const def of colorDefs) {
      const parts = def.split(':').map(s => s.trim());
      if (parts.length >= 3) {
        const [tag, label, hex] = parts;
        // Convert hex to rgba at 0.3 opacity
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        tags[tag] = { label, color: `rgba(${r},${g},${b},0.3)` };
      }
    }

    let raw = this.textContent.trim();
    let html = raw;

    for (const [tag, { color }] of Object.entries(tags)) {
      const openRe = new RegExp(`\\{${tag}\\}`, 'g');
      const closeRe = new RegExp(`\\{/${tag}\\}`, 'g');
      html = html.replace(openRe, `<span style="background:${color}; padding:4px 10px; border-radius:4px;">`);
      html = html.replace(closeRe, '</span>');
    }

    html = html.replace(/\s+/g, ' ').trim();

    const showLegend = !this.hasAttribute('no-legend');
    const showQuotes = !this.hasAttribute('no-quotes');

    const prefix = showQuotes ? '\u00AB\u00A0' : '';
    const suffix = showQuotes ? '\u00A0\u00BB' : '';

    let legendHtml = '';
    if (showLegend && Object.keys(tags).length > 0) {
      const items = Object.values(tags).map(({ label, color }) =>
        `<span style="background:${color}; padding:4px 10px; border-radius:4px; font-size:0.7em;">${label}</span>`
      ).join(' ');
      legendHtml = `<div style="margin-top:12px; display:flex; gap:24px; justify-content:center;">${items}</div>`;
    }

    this.innerHTML = `
      <div style="background:#f5f5f5; padding:30px 40px; border-radius:12px; font-size:0.85em; margin:20px 0;">
        <p style="line-height:2.2 !important; margin:0;">${prefix}${html}${suffix}</p>
      </div>
      ${legendHtml}
    `;
  }
}
