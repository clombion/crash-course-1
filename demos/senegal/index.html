<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senegal Health Risk Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #252542;
            --text-primary: #f0f0f0;
            --accent: #e6b84a;
            --border: #3a3a5a;
        }
        
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        
        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
            box-sizing: border-box;
        }

        header h1 { font-size: 1.25rem; font-weight: 600; margin: 0; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem; }
        header h1 svg { color: var(--accent); }

        .btn {
            background: #2d2d4a;
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .btn:hover { border-color: var(--accent); background: var(--bg-secondary); }

        #map { height: calc(100vh - 64px); width: 100vw; background: #242424; }

        /* Leaflet Overrides */
        .leaflet-control-layers, .legend {
            background: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
        }
        
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 12 10-10 10 10"/><path d="m7 21 0-10 10 0 0 10"/></svg>
            Senegal Health Risk Map
        </h1>
        <a href="../../index.html" class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Return to Home
        </a>
    </header>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
