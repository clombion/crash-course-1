<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Flood Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            Global Flood Dashboard
        </h1>
        <a href="../../index.html" class="btn-return">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Return to Home
        </a>
    </header>
    <main>
        <div class="grid">
            <div class="card">
                <h3>Top 20 Countries by Flood Events</h3>
                <div class="chart-container">
                    <canvas id="chart-countries"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>Flood Events per Year</h3>
                <div class="chart-container">
                    <canvas id="chart-years"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>Events by Category</h3>
                <div class="chart-container">
                    <canvas id="chart-categories"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>Total Displaced by Severity</h3>
                <div class="chart-container">
                    <canvas id="chart-severity"></canvas>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
