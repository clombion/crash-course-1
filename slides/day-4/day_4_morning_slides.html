<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis and<br>Storytelling</title>

  <!-- Reveal.js (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css">

  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/monokai.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Roboto+Mono:wght@400;500;600;700&family=Roboto+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
/* ===============================================================
   CLI Reveal.js Theme — Civic Literacy Initiative
   ===============================================================
   Targets reveal.js selectors (.reveal .slides section).
   Uses pt for font sizes (PowerPoint convention).
   Loaded via <link> or embedded in template <style>.
   =============================================================== */

/* =========================
   CSS VARIABLES
   ========================= */
:root {
  /* Brand Colors */
  --cli-navy: #091A31;
  --cli-blue: #56ABE1;
  --cli-blue-light: #B6DEFF;
  --cli-blue-pale: #EBF6FF;
  --cli-white: #FFFFFF;
  --cli-red: #CC0000;
  --cli-gray: #888888;

  /* Extended palette (charts, diagrams) */
  --cli-purple: #6B4C9A;
  --cli-cyan: #2EC4B6;
  --cli-gold: #D4A843;

  /* Typography */
  --font-title: 'Roboto Mono', 'Courier New', monospace;
  --font-title-narrow: 'Roboto Condensed', Arial, sans-serif;
  --font-body: 'DM Sans', Arial, sans-serif;
  --font-code: 'Roboto Mono', monospace;

  /* Font sizes (pt) — designed for 1920×1080 reveal.js canvas */
  --fs-title-display: 76pt;
  --fs-title-section: 68pt;
  --fs-title-subsection: 72pt;
  --fs-title-slide: 36pt;
  --fs-body: 28pt;
  --fs-body-small: 22pt;
  --fs-footer: 14pt;
  --fs-code: 22pt;

  /* Spacing — asymmetric: more right padding for breathing room */
  --slide-padding: 72px 160px 72px 96px;
}

/* =========================
   BASE / RESET
   ========================= */
.reveal {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  color: var(--cli-navy);
}

/* display: flex is set via Reveal config (display: 'flex').
   center: false prevents reveal.js from injecting inline top offsets.
   Sections size to content by default — do NOT set height: 100% here
   as it triggers reveal.js's overflow stacking algorithm on content
   slides. Dark slide types (title, section, subsection) override with
   height: 100% individually since they have simple layouts that need
   full-viewport vertical positioning (margin-top: auto, justify-content).
   top: 0 anchors slides to the top — without it, position: absolute
   with top: auto places sections at their "static position", which
   shifts down based on preceding siblings in the DOM. */
.reveal .slides section {
  text-align: left;
  padding: var(--slide-padding);
  box-sizing: border-box;
  flex-direction: column;
  top: 0;
}

.reveal h1, .reveal h2, .reveal h3 {
  font-family: var(--font-title);
  font-weight: 700;
  text-transform: none;
  letter-spacing: 0;
  color: inherit;
}

/* =========================
   TITLE SLIDE
   ========================= */
.reveal .slides section.title-slide {
  background: var(--cli-navy);
  color: var(--cli-white);
  padding: 72px 96px;
  height: 100%;
}

.reveal .slides section.title-slide .url {
  font-family: var(--font-body);
  font-size: var(--fs-body-small);
  color: var(--cli-white);
  margin-top: auto;
  margin-bottom: 0;
}

.reveal .slides section.title-slide .title-logo {
  position: absolute;
  top: 48px;
  right: 64px;
  width: 280px;
  height: auto;
}

.reveal .slides section.title-slide .project-context {
  font-size: var(--fs-body);
  font-weight: 400;
  opacity: 0.8;
  margin: 0 0 8px 0;
}

.reveal .slides section.title-slide h1 {
  font-size: var(--fs-title-display);
  font-weight: 500;
  color: var(--cli-blue) !important;
  margin: 24px 0 32px 0;
  line-height: 1.35;
  max-width: 60%;
  letter-spacing: -0.03em;
  word-spacing: -0.15em;
}

.reveal .slides section.title-slide .subtitle {
  font-size: var(--fs-title-slide);
  font-weight: 400;
  color: var(--cli-white);
  opacity: 0.9;
  margin: 0;
}

/* =========================
   CONTENTS / TOC
   ========================= */
.reveal .slides section.toc-slide {
  background: var(--cli-white);
}

.reveal .slides section.toc-slide h2 {
  font-size: var(--fs-title-slide);
  color: var(--cli-navy);
  margin: 0 0 36px 0;
}

.reveal .slides section.toc-slide .toc-list {
  list-style: none;
  padding: 0;
  margin: 0;
  counter-reset: toc-item;
}

.reveal .slides section.toc-slide .toc-list li {
  counter-increment: toc-item;
  font-size: var(--fs-body);
  margin-bottom: 20px;
  padding-left: 2.2em;
}

.reveal .slides section.toc-slide .toc-list li::before {
  content: counter(toc-item, upper-roman) ".";
  color: var(--cli-blue);
  font-weight: 600;
  min-width: 40px;
  display: inline-block;
  position: absolute;
  left: 0;
}

/* =========================
   SECTION DIVIDER
   ========================= */
.reveal .slides section.section-slide {
  background: var(--cli-navy);
  color: var(--cli-white);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 96px;
  height: 100%;
}

.reveal .slides section.section-slide h1 {
  font-size: var(--fs-title-section);
  color: var(--cli-white);
  margin: 0;
  line-height: 1.15;
  max-width: 60%;
}

.reveal .slides section.section-slide .section-label {
  font-family: var(--font-body);
  font-size: var(--fs-body-small);
  color: var(--cli-blue);
  margin-bottom: 16px;
  display: block;
  font-weight: 400;
}

/* =========================
   SUB-SECTION DIVIDER
   ========================= */
.reveal .slides section.subsection-slide {
  background: var(--cli-navy);
  color: var(--cli-white);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 96px;
  height: 100%;
}

.reveal .slides section.subsection-slide .section-label {
  font-family: var(--font-body);
  font-size: var(--fs-body-small);
  color: var(--cli-white);
  opacity: 0.7;
  margin-bottom: 16px;
  display: block;
}

.reveal .slides section.subsection-slide h1 {
  font-family: var(--font-title-narrow);
  font-size: var(--fs-title-subsection);
  font-weight: 600;
  color: var(--cli-blue);
  margin: 0;
  line-height: 1.2;
  max-width: 60%;
}

/* =========================
   CONTENT SLIDE
   ========================= */
.reveal .slides section.content-slide {
  background: var(--cli-white);
  color: var(--cli-navy);
}

.reveal .slides section.content-slide h2 {
  font-size: var(--fs-title-slide);
  margin: 0 0 36px 0;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--cli-blue-light);
  display: flex;
  align-items: center;
  gap: 16px;
  margin-right: 96px;
}

.reveal .slides section.content-slide .chevron {
  color: var(--cli-blue);
  font-weight: 400;
}

/* Auto-insert chevron on content slide h2 (markdown-authored decks) */
.reveal .slides section.content-slide h2::before {
  content: "> ";
  color: var(--cli-blue);
  font-weight: 400;
}

/* Prevent double chevron when explicit <span class="chevron"> is present */
.reveal .slides section.content-slide h2:has(.chevron)::before {
  content: none;
}

.reveal .slides section.content-slide .content {
  flex: 1;
}

/* =========================
   PARAGRAPH SPACING
   ========================= */
.reveal .slides section p {
  margin: 0 0 24px 0;
}

.reveal .slides section p + ul,
.reveal .slides section p + ol {
  margin-top: 10px;
}

.reveal .slides section ul + p,
.reveal .slides section ol + p {
  margin-top: 28px;
}

/* =========================
   TWO-COLUMN LAYOUT
   ========================= */
.two-column {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  flex: 1;
}

.column-header {
  background: var(--cli-blue-light);
  padding: 12px 20px;
  font-weight: 600;
  font-size: var(--fs-body);
  margin-bottom: 20px;
}

/* Uneven splits */
.two-column.split-2-1 {
  grid-template-columns: 2fr 1fr;
}

.two-column.split-1-2 {
  grid-template-columns: 1fr 2fr;
}

/* =========================
   DATA / CHART SLIDE
   ========================= */
.reveal .slides section.data-slide {
  /* position: relative removed — the base section rule's position: absolute
     already serves as a containing block for the ::before triangle accent.
     Explicitly setting relative here fought with reveal.js's slide positioning
     and caused data slides to stack in normal flow instead of overlapping. */
}

/* Navy triangle accent — top-right corner */
.reveal .slides section.data-slide::before {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 0 120px 120px 0;
  border-color: transparent var(--cli-navy) transparent transparent;
  z-index: 0;
}

.data-layout {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: 40px;
  flex: 1;
  align-items: center;
}

.data-narrative {
  font-size: var(--fs-body);
  line-height: 1.5;
}

/* =========================
   LISTS
   ========================= */
.reveal .slides section ul,
.reveal .slides section ol {
  margin: 0;
  padding-left: 0;
  list-style: none;
}

.reveal .slides section ul li,
.reveal .slides section ol li {
  margin-bottom: 0.5em;
  font-size: var(--fs-body);
  line-height: 1.4;
  position: relative;
  padding-left: 1.6em;
}

.reveal .slides section ul li::before {
  content: ">";
  color: var(--cli-blue);
  font-family: var(--font-title);
  font-weight: 600;
  position: absolute;
  left: 0;
}

/* Arrow variant */
.reveal .slides section ul.arrow-list li::before {
  content: "\2192";
}

.reveal .slides section ol {
  counter-reset: item;
}

.reveal .slides section ol li::before {
  counter-increment: item;
  content: counter(item) ".";
  color: var(--cli-blue);
  font-family: var(--font-title);
  font-weight: 600;
  position: absolute;
  left: 0;
}

/* =========================
   TABLES
   ========================= */
.reveal .slides section table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--fs-body-small);
  margin: 28px 0 48px 0;
}

.reveal .slides section th {
  background: var(--cli-navy);
  color: var(--cli-white);
  padding: 20px 20px;
  text-align: left;
  font-weight: 600;
  font-family: var(--font-body);
}

.reveal .slides section td {
  padding: 20px 20px;
  border-bottom: 1px solid var(--cli-blue-light);
}

/* Alternate rows so the LAST body row is always blue-pale.
   Scoped to tbody tr so the thead row is unaffected.
   nth-last-child counts from the bottom: last = 1 (odd → blue). */
.reveal .slides section tbody tr:nth-last-child(odd) td {
  background: var(--cli-blue-pale);
}
.reveal .slides section tbody tr:nth-last-child(even) td {
  background: transparent;
}

/* Compact table variant — tighter row padding for dense tables */
.reveal .slides section .compact td,
.reveal .slides section .compact th {
  padding: 10px 20px;
}

/* =========================
   CALLOUTS & BOXES
   ========================= */
.callout {
  background: var(--cli-blue-pale);
  border-left: 4px solid var(--cli-blue);
  padding: 20px;
  margin: 20px 0;
  font-size: var(--fs-body);
}

.alert {
  background: #FFF0F0;
  border-left: 4px solid var(--cli-red);
  padding: 20px;
  margin: 20px 0;
  font-size: var(--fs-body);
}

/* =========================
   CODE
   ========================= */
.reveal .slides section code {
  font-family: var(--font-code);
  font-size: var(--fs-code);
  background: var(--cli-blue-pale);
  padding: 2px 6px;
  border-radius: 3px;
}

.reveal .slides section pre {
  background: var(--cli-navy);
  padding: 24px;
  border-radius: 4px;
  width: 100%;
  box-sizing: border-box;
}

.reveal .slides section pre code {
  background: transparent;
  color: var(--cli-white);
  padding: 0;
  font-size: var(--fs-code);
  line-height: 1.5;
}

/* =========================
   SCREENSHOT CONTAINER
   ========================= */
.screenshot-container {
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
  border: 1px solid var(--cli-blue-light);
  max-width: 85%;
  margin: 16px auto;
}

.screenshot-container img {
  display: block;
  width: 100%;
  height: auto;
}

/* Dark screenshot variant (for dark UI captures) */
.screenshot-container.dark {
  border-color: var(--cli-navy);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
}

/* Screenshot with caption */
.screenshot-caption {
  font-size: var(--fs-body-small);
  color: var(--cli-gray);
  text-align: center;
  margin-top: 8px;
}

/* =========================
   ANNOTATION OVERLAYS
   ========================= */
.annotated {
  position: relative;
  display: inline-block;
}

.annotation-circle {
  position: absolute;
  border: 3px solid var(--cli-red);
  border-radius: 50%;
  pointer-events: none;
}

.annotation-arrow {
  position: absolute;
  color: var(--cli-red);
  font-size: 24pt;
  pointer-events: none;
}

/* =========================
   DIAGRAM ELEMENTS
   ========================= */
.entity-card {
  border: 2px solid var(--cli-blue-light);
  border-radius: 4px;
  overflow: hidden;
  display: inline-block;
}

.entity-card .entity-header {
  background: var(--cli-blue);
  color: var(--cli-white);
  padding: 8px 14px;
  font-weight: 600;
  font-size: var(--fs-body-small);
}

.entity-card .entity-body {
  padding: 10px 14px;
  font-size: var(--fs-body-small);
}

/* =========================
   GLOBAL FOOTER
   ========================= */
/* Lives outside .slides, inside .reveal — always pinned to bottom.
   Reveal.js scales .slides via transform but the global footer sits
   in the same scaled coordinate space when placed inside .reveal. */
.global-footer {
  position: absolute;
  bottom: 40px;
  left: 56px;
  right: 56px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 20;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.global-footer .url {
  font-family: var(--font-body);
  font-size: var(--fs-footer);
  color: var(--cli-gray);
}

.global-footer .page-number {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-body);
  font-size: var(--fs-footer);
  color: var(--cli-gray);
  pointer-events: none;
}

.global-footer .footer-logo {
  width: 48px;
  height: auto;
}

/* Hide global footer on dark-background slides (title, section, subsection) */
.global-footer.hidden {
  opacity: 0;
}

/* =========================
   PER-SLIDE SOURCE OVERLAY
   ========================= */
/* Optional element inside a section for slide-specific metadata
   (e.g., "Source: EITI Reports 2023"). Sits at the bottom of the
   slide content, just above the global footer. Most slides omit this. */
.slide-source {
  font-family: var(--font-body);
  font-size: var(--fs-footer);
  color: var(--cli-gray);
  margin-top: auto;
  padding-top: 8px;
}

/* =========================
   FRAGMENTS (reveal.js)
   ========================= */
.reveal .slides section .fragment.highlight-blue.visible {
  color: var(--cli-blue);
}

/* =========================
   PRINT / PDF
   ========================= */
@media print {
  .reveal .slides section {
    page-break-inside: avoid;
  }
  .screenshot-container {
    box-shadow: none;
    border: 1px solid #ccc;
  }
}

  </style>
</head>

<div class="reveal">
  <div class="slides">
    <section data-markdown data-separator="\n---\n" data-separator-notes="^Note:">
      <textarea data-template>

# Finishing the<br>Cleaning

Note:
"The data is cleaner than yesterday, but the MainCause column still has ~260 unique values. That's too many for a chart. We need to group them into categories."

---

## Too many categories to visualise

The MainCause column has **~260 unique values** after cleaning: Heavy rain, Monsoonal rain, Tropical Storm Irene, Tropical Storm Harvey, etc.

A bar chart of 260 categories is unreadable. We need to group them into **7-8 broad categories**.

<div class="compact">

| Category | Includes |
|---|---|
| Heavy rain | Heavy rain, Torrential rain, Brief torrential rain |
| Tropical storm | All named tropical storms and cyclones |
| Monsoonal rain | Monsoonal rain and variants |
| Snowmelt | Snowmelt, rain and snowmelt |
| Dam break | Dam break, dam release, dam failure |
| Ice/avalanche | Ice jams, avalanche |
| Other | Tsunami, storm surge, landslide, etc. |

</div>

Note:
Walk through the categories. Students can adjust these if they want. The point is reducing 260 values to something a chart can show meaningfully.

---

## Step 1: create a mapping sheet

In your Google Sheets FloodArchive file:

1. Create a new sheet called **"Mapping"**
2. In cell A1, type a header: `original_cause`
3. In cell A2, use: `=UNIQUE(MainSheet!E:E)` (adjust the column reference to your MainCause column)
4. This gives you every unique MainCause value in one list
5. **Sort** the list (Data → Sort) so similar values are next to each other

Note:
Demo this live. The UNIQUE formula pulls all distinct values. Sorting clusters them: all the "Tropical Storm ..." values will be together, making it easy to assign categories.

---

## Step 2: add categories

In column B of the Mapping sheet, add a header: `category`

Go through the list and type the category for each value:

- All "Heavy rain" variants → `Heavy rain`
- All "Tropical Storm ..." → `Tropical storm`
- All "Monsoonal ..." → `Monsoonal rain`
- etc.

This is a **human decision**. You decide what belongs where. The mapping sheet documents every decision.

Note:
This takes 10-15 minutes. Some values are ambiguous: "Tropical Storm and Heavy Rain" — is that tropical storm or heavy rain? Students decide. The mapping sheet is the documentation.

---

## Step 3: apply the mapping with FILTER

Back in your main data sheet, add a new column: `category`

In the first data row, use:

```
=FILTER(Mapping!B:B, Mapping!A:A = E2)
```

This looks up the MainCause value in the Mapping sheet and returns the category.

Copy the formula down to all rows.

Note:
Demo this live. FILTER is simpler than VLOOKUP: "give me the value from column B where column A matches this cell." If students get an error, the MainCause value may not be in the mapping sheet (check for new whitespace issues).

---

## Alternative: categorise with IFS and SEARCH

Instead of a mapping sheet, you can categorise directly with a formula:

```
=IFS(
  IFERROR(SEARCH("heavy rain",E2),0)>0, "Heavy rain",
  IFERROR(SEARCH("cyclone",E2),0)>0, "Tropical storm",
  IFERROR(SEARCH("typhoon",E2),0)>0, "Tropical storm",
  IFERROR(SEARCH("monsoon",E2),0)>0, "Monsoonal rain",
  IFERROR(SEARCH("snow",E2),0)>0, "Snowmelt",
  IFERROR(SEARCH("dam",E2),0)>0, "Dam break",
  TRUE, "Other"
)
```

`SEARCH` finds text within a cell. `IFERROR` handles cases where the text is not found. `IFS` checks conditions in order.

Both approaches work. FILTER + mapping sheet is more transparent. IFS + SEARCH is faster for large datasets.

Note:
This is the approach that was actually used in class. SEARCH returns an error when it doesn't find the text, which blocks IFS entirely — hence the IFERROR wrapper. Some students will have semicolons instead of commas as formula delimiters depending on their locale.

---

## Step 4: keep only what you need

Your spreadsheet now has many columns. For the visualisation, you only need a few.

1. Create a **new sheet**
2. Copy only the columns you need: Country, Began, Ended, Dead, Displaced, Severity, **category**
3. Paste as **values only** (so formulas become plain data)
4. Download as CSV: File → Download → Comma Separated Values
5. Upload the CSV to your Codespace

This clean, categorised CSV is what the charts will read.

Note:
The values-only paste is important: the downloaded CSV should not contain formulas. Students upload to their Codespace via drag-and-drop or the GitHub upload interface.

---

## Step 5: investigate ambiguous values

We identified this on Day 3 but haven't acted on it yet.

Look at the **OtherCountry** column. It contains a mix of:

- `0` (3,382 rows) — does this mean "no other country affected" or "unknown"?
- Blank (1,344 rows) — is this different from 0?
- Actual country names (the remaining rows) — a flood that affected multiple countries

One approach: create a helper column `multi_country` that turns this into a clean **Yes/No**.

**Make a decision, apply it consistently, and write it down.**

Note:
Quick exercise. Give 5-10 minutes. The OtherCountry column is the clearest example: 0 and blank are clearly both meant to indicate "no other country" but are coded differently. Students should standardise them. Next slide shows three formula options.

---

## Three ways to write the same logic

All three produce a `multi_country` column with Yes or No:

**Nested IF:**
```
=IF(D2="0", "No", IF(D2="", "No", "Yes"))
```

**IFS** (checks conditions in order, returns first match):
```
=IFS(D2="0", "No", D2="", "No", TRUE, "Yes")
```

**IF with OR** (most readable here):
```
=IF(OR(D2="0", D2=""), "No", "Yes")
```

There are often multiple ways to reach the same result. Sometimes they are equivalent, like here. Other times one is much easier to use than another. Ask your chatbot which formula fits your situation.

Note:
Walk through all three. For this case IF(OR()) is the cleanest. But nested IF is useful when each condition has a different result (e.g., mapping severity 1/1.5/2 to Low/Medium/High). IFS is the same as nested IF but flatter. The point: know the options exist, ask the chatbot which fits.

---

## Validating multi-country entries

For rows where OtherCountry has a real country name, do the two countries actually share a border?

Brazil + Vietnam? Suspicious. Brazil + Argentina? Plausible.

The **REST Countries API** has a `borders` field:

```
https://restcountries.com/v3.1/name/brazil?fields=borders
```

Returns: `["ARG", "BOL", "COL", "GUY", "PRY", "PER", "SUR", "URY", "VEN"]`

This is geographic knowledge that formulas cannot provide. An API can.

Note:
Quick example of using an API for verification. You could use OpenRefine's "add column by fetching URLs" to call this API for each country and check if the paired country appears in the borders list. This is the kind of verification that separates careful data work from trusting the dataset blindly.

---

## Data cleaning involves ethical choices

Standardising country names is not always straightforward:

- **Scotland, UK, United Kingdom** — is Scotland its own entity or part of the UK?
- **USSR, Soviet Union, Russia** — historical entities that no longer exist
- **Palestine, Gaza** — politically contested boundaries
- **Czechoslovakia, West Germany, East Germany** — countries that split or merged

There is no universal correct answer. **It depends on what you use the data for.** Document your choices and your reasoning.

Note:
This came up when students cleaned the country column. The decision to merge Scotland into UK is a value-laden choice, not a technical one. The principle: acknowledge the choice, document it, and be prepared to explain it.

---

## Core vs peripheral competencies

<div class="two-column">
<div class="column">
<div class="column-header">Core (build skill here)</div>

- Data cleaning and validation
- Formula logic and spreadsheet work
- Judging whether results make sense
- Understanding what the data represents

These require **your judgment**. AI cannot replace it.

</div>
<div class="column">
<div class="column-header">Peripheral (AI can handle)</div>

- Writing HTML and CSS
- Memorising git commands
- Producing visual polish
- Code syntax

These are mechanical. AI does them well.

</div>
</div>

Best AI use: ask **"what function would I use for this?"** — not "do it for me."

Note:
Sharp distinction. Students should not delegate data judgment to AI. But they should absolutely delegate HTML writing, git commands, and visual design. "As a data practitioner, it doesn't matter whether I can write HTML. That's not the core competency." But knowing whether the data looks right — that's irreplaceable.

---

## Build good taste in data

If you rely on AI to do all the data work, you will never develop **intuition** for what right data looks like and what wrong data looks like.

- Sort the column. Scroll through. Does anything stand out?
- Check the min and max. Do they make sense?
- Count the categories. Are there too many?

This is why we do manual spreadsheet work, even when AI could do it faster. **You are building judgment**, not just producing output.

Note:
"You need to build a good taste in data." This is the deepest reason for the manual cleaning exercises. The point is not efficiency — it's developing the ability to spot problems that AI will miss.

---

## Principles of data cleaning (1/2)

Cleaning is not a single operation. It is a sequence of **decisions**, each documented.

- **Never modify the original file.** Work on a copy. Keep the raw data intact.
- **Never let AI modify data content directly.** AI can write scripts that transform data (filter rows, create columns), but should not edit values by itself. If the logic can't be expressed as a script or formula, do it manually.
- **Look at the data yourself.** Open it in a spreadsheet, sort, filter, scroll. You need intuition about the data before you can clean it or visualise it.

Note:
These are the principles behind the techniques. The techniques change depending on the dataset. The principles don't.

---

## Principles of data cleaning (2/2)

- **Create new columns rather than overwriting.** Use helper columns with formulas (TRIM, IF, FILTER) instead of modifying values directly with Find and Replace. The original stays intact, and your logic is visible in the formula.
- **One problem at a time.** Don't try to fix everything in one pass.
- **Use the right tool for the job.** Some tasks are spreadsheet work, some need OpenRefine, some need scripts.
- **Document every decision.** If someone asks "why did you change this value?", you should be able to point to a record.
- **Verify after each step.** Count rows, check totals, filter to confirm.

Note:
Continued from previous slide.

---

## Recap: the cleaning process

<div class="compact">

| Step | What | Tool / technique |
|---|---|---|
| **Explore** | Sort, filter, look for problems | Google Sheets |
| **Trim whitespace** | Remove invisible spaces | Google Sheets automated suggestion + TRIM formula in a helper column |
| **Standardise values** | Fix typos, merge variants | OpenRefine clustering, or filter-and-overwrite in Google Sheets |
| **Investigate ambiguity** | Decide what 0 or blank means | IF/IFS/OR formulas to create clean helper columns |
| **Categorise** | Group many values into few | Mapping sheet (UNIQUE + FILTER) in Google Sheets |
| **Reduce** | Keep only needed columns | New sheet, paste as values only, export CSV |

</div>

Note:
This closes the cleaning arc. Key tools: Google Sheets for exploration and manual fixes, helper columns for formulas like TRIM and FILTER, OpenRefine for large-scale standardisation, human judgment for ambiguous values. At every step: you made the decisions, the tools executed them.

# Choosing the<br>Right Chart

Note:
"Before we build the visualisation page, let's talk about how to choose what to show and how to show it."

---

## What is your chart trying to do?

The chart type depends on the **task**, not the data format.

| Task | Chart type |
|---|---|
| Show change **over time** | Line chart |
| **Compare** categories | Bar chart |
| Show **parts of a whole** | Pie or donut chart (use sparingly) |
| Show **distribution** | Histogram |
| Show **relationship** between two variables | Scatter plot |
| Show **geographic** patterns | Map |

If you are unsure, a **bar chart** is almost always a safe default.

Note:
Students will want to use pie charts for everything. Pie charts are hard to read when there are more than 4-5 slices. Bar charts are almost always clearer. The task-first approach prevents "I have data, what chart should I use?" — instead ask "what am I trying to show?"

---

## Storytelling vs exploration

<div class="two-column">
<div class="column">
<div class="column-header">Storytelling</div>

For your **proposal** and presentations.

- Simple, one message per chart
- Easy to understand in one glance
- Minimal interactivity
- Title states the finding, not the topic

"Flood events have doubled since 2000" — not "Flood events over time"

</div>
<div class="column">
<div class="column-header">Exploration</div>

For your own **analysis** and investigation.

- More complex, multiple dimensions
- May need legends, tooltips, filters
- Interactive (zoom, filter, hover)
- Title describes the data, not the conclusion

"Flood events by country and year" — inviting the viewer to explore

</div>
</div>

For the proposal: **storytelling**. For your data portal: **exploration** is fine.

Note:
This distinction matters for the peer review later: are the visuals communicating a point quickly (storytelling) or requiring the viewer to dig in (exploration)? Both are valid, but for different audiences. A funder wants storytelling. A colleague wants exploration. The charts page can serve exploration; the proposal should use storytelling.

# Building the<br>Visualisation Page

Note:
"Your data is clean and categorised. Now let's turn it into something visual."

---

## What we are building

A **single HTML page** with multiple charts showing different views of the FloodArchive data:

- Flood events by **country** (top 20)
- Flood events **per year** (trend)
- Breakdown by **category** (the 7 groups you just created)
- Total displaced by **severity**

Presented as **cards**: each chart in its own box, arranged on the page. Cards are a good default for presenting multiple pieces of information with structure.

Note:
Preview the end result. The category chart is the payoff of the cleaning work: 7 clean bars instead of 260.

---

## Being precise with your prompt

Just like asking for a "simple Leaflet map," be specific about visualisations:

- Name the **library**: "use Chart.js" (works in a single HTML file, no installation needed)
- Name the **chart types**: "a bar chart for countries, a line chart for years"
- Name the **layout**: "present each chart as a card on the page"
- Name the **data source**: "read the CSV from my repo"

If you say "make me some visualisations," the agent will guess and you will waste tokens.

Note:
Same principle as maps. Precision saves tokens and produces better results. Chart.js works in a standalone HTML file like Leaflet does — no build tools needed.

---

## Prompt for the visualisation page

<cli-highlight-prompt>
{objective}Build a simple HTML page using Chart.js that reads my cleaned FloodArchive CSV.{/objective} Create {output}four charts presented as cards on the page: (1) a bar chart of flood events by country, top 20, (2) a line chart of flood events per year, (3) a bar chart of events by category, (4) a bar chart of total displaced by Severity.{/output} When you're done, {steps}publish it on GitHub Pages at a different URL than the map, from the main branch.{/steps} {reasoning}I'm a beginner, please explain what you're doing in simple terms.{/reasoning}
</cli-highlight-prompt>

Note:
The separate filename matters. index.html is the map for now. charts.html will be accessible at username.github.io/repo-name/charts.html. We will reorganise the URLs when we build the landing page.

---

## Exercise: build and publish the charts page

**Individual work — 30 minutes**

1. Make sure your cleaned, categorised CSV is in the Codespace
2. Ask Gemini to build the Chart.js page (use the prompt above)
3. Push and check the live page at `your-repo/charts.html`
4. Refine: adjust colours, labels, chart types if needed

If the charts look wrong, check the data: are categories consistent? Is the CSV loading correctly?

Note:
The charts are the verification of the cleaning and categorisation: if a chart shows too many bars, the categorisation missed something. Circulate and help. Common issues: CSV not loading (wrong URL or path), charts empty (column name mismatch).

# Better Design<br>with v0

Note:
"Your charts page works but looks basic. Before we build the landing page, let's talk about making things look professional."

---

## v0 by Vercel

**v0.dev** is an AI-powered webpage creator that generates polished web pages from a description.

- Describe what you want → get a professional-looking page
- Good for **landing pages, dashboards, layouts**
- Much better at visual design than Gemini CLI

**The key trick:** always ask for **"pure HTML, CSS, and JavaScript in a single file."** By default v0 produces overly complex code that won't work on GitHub Pages. The single-file constraint keeps it simple and compatible.

Note:
v0 is a different tool for a different job. Gemini handles data work (scripts, APIs, file manipulation). v0 handles design (layouts, typography, colour). You can use v0 to generate the HTML, then bring it into your Codespace and connect it to your data with Gemini.

---

## Using v0 for this project

Two uses:

1. **Landing page design**: describe your portal layout to v0, get a polished single-file HTML page, upload it to your Codespace and ask Gemini to use it as a starting point
2. **Map page redesign**: upload your current map HTML to v0 and ask it to improve the design

In both cases: generate the design in v0, download the HTML, upload to your Codespace, then use Gemini to connect it to your data.

Note:
Demo this live if time allows. The workflow: v0 for the visual shell, Gemini for the data plumbing. Students can also use v0 for their individual projects in the afternoon.

# The Landing Page

Note:
"Now let's build the portal, using v0 or Gemini — your choice."

---

## A mini open data portal

Your landing page is the **entry point** to your project. It lists:

- **Project title and description** — what is this about?
- **Datasets** with metadata: what data, where from, what format, when retrieved
- **Navigation** — links to the map and charts pages

Think of it as a one-page open data portal: someone landing on this URL should understand what the project is, what data it uses, and where to explore further.

Note:
The landing page is both a deliverable (something a funder can look at) and documentation (what data was used and where it came from). It replaces the current index.html.

## Data privacy: separate the data from the interface

When working with sensitive data, **never send the real data to AI tools**.

Instead:
1. **Build the interface first** with anonymised sample data (first 5 rows, randomised coordinates)
2. Share only the sample with the AI
3. Connect the interface to the real data afterwards

Self-contained HTML pages process data **entirely in the browser**. Your data never leaves your device, even when the page is published.

**Rule of thumb:** any tool you use for free, don't put sensitive data in it.

Note:
Important for students working in organisations with PII. Paid AI tools may contractually commit not to train on your data. Free tools make no such guarantee. The self-contained HTML architecture (Leaflet maps, Chart.js dashboards) is inherently privacy-safe because all processing happens client-side.

# Skills:<br>Saving Your Process

Note:
"Your repo is clean, your pages are polished. Let's save this process so you don't have to explain it again next time."

## What is a skill?

A **skill** is a saved procedure that tells the AI how to do a specific task. A guide and a shortcut.

Instead of explaining every detail each time, you save the process once. Next time, you say "use the map skill" and the AI follows the saved procedure.

A skill is a **markdown file** with:
- A **name** and **description** (so the AI knows when to use it)
- The **steps** to follow
- Any **scripts or templates** (so it doesn't have to recreate them)

Note:
Connect to Lecture 4 where skills were introduced. When you save a skill, the AI may also save templates (e.g., a base HTML file for maps) so it doesn't have to recreate them each time.

---

## Skill scope

<div class="two-column">
<div class="column">
<div class="column-header">Workspace scope</div>

Available **only in this project folder**.

Good for project-specific procedures: "how we build maps for this disaster preparedness project."

</div>
<div class="column">
<div class="column-header">Global scope</div>

Available **across all projects**.

Good for general procedures: "how I build any Leaflet map" or "how I clean CSV files."

</div>
</div>

Be selective. The more skills the AI has loaded, the more confused it can get. Keep skills focused and relevant.

Note:
Scope matters. A project-specific skill in global scope pollutes other projects. A general skill in workspace scope has to be recreated for each project. Ask Gemini which scope to use when saving. Warning: too many unrelated skills degrade performance.

## Q&A: OpenRefine from the terminal?

Some of you asked about running OpenRefine through Gemini CLI. OpenRefine itself is a GUI tool, but:

**orcli** is a command-line interface for OpenRefine. It lets you script OpenRefine operations (import, cluster, apply operations, export) from the terminal.

In practice, for the kind of cleaning we did this week, having Gemini write a Python script that does fingerprint clustering achieves the same result without installing OpenRefine. But if you work with OpenRefine regularly, orcli lets you automate recurring cleaning workflows.

Note:
Brief answer to the question raised in class. orcli exists but requires Java + OpenRefine installed. For Codespaces, the Python script approach is lighter. For their own machines where OpenRefine is already installed, orcli is worth knowing about.

<script>
/**
 * <cli-csv> — Hand-drawn CSV file diagram with cropped-document feel.
 *
 * Renders tabular data as a sketched spreadsheet with wobbly hand-drawn
 * grid lines and crisp text. The top shows a file tab; the bottom fades
 * out with a gradient mask, suggesting the data continues beyond view.
 *
 * Usage in markdown:
 *   <cli-csv file="commitments.csv" wrap="1,5">
 *     id, commitment, actor, amount, timeline, quote
 *     1, Infrastructure programme, Gov of SA, R1 trillion, 3 years, "invest over R1 trillion…"
 *   </cli-csv>
 *
 * Attributes:
 *   file  — optional filename label shown in the file tab (gray, monospace)
 *   wrap  — comma-separated column indices (0-based) that wrap text instead
 *           of clipping with ellipsis. Wrapped columns grow row height to fit.
 *           Omitted = all columns clip.
 *
 * Text content:
 *   One line per row, comma-separated. First line becomes the header row.
 *   Supports basic quoted strings (commas inside quotes are preserved).
 */
class CliCsv extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['file', 'wrap'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _parseLine(line) {
    const cells = [];
    let current = '';
    let inQuotes = false;
    for (const ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; current += ch; }
      else if (ch === ',' && !inQuotes) { cells.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    cells.push(current.trim());
    return cells;
  }

  // Seeded pseudo-random for consistent wobble across renders
  _srand(seed, i) {
    const x = Math.sin(seed * 127.1 + i * 311.7) * 43758.5453;
    return (x - Math.floor(x)) * 2 - 1; // -1 to 1
  }

  // Draw a wobbly line as an SVG path with quadratic bezier segments
  _wobbleLine(x1, y1, x2, y2, seed, wobbleAmt) {
    const segments = 5;
    const dx = (x2 - x1) / segments;
    const dy = (y2 - y1) / segments;
    const w = wobbleAmt || 4;

    let d = `M${x1.toFixed(1)},${y1.toFixed(1)}`;
    for (let i = 1; i <= segments; i++) {
      const endX = x1 + dx * i + (i < segments ? this._srand(seed, i) * w * 0.3 : 0);
      const endY = y1 + dy * i + (i < segments ? this._srand(seed, i + 50) * w * 0.3 : 0);
      const cpX = x1 + dx * (i - 0.5) + this._srand(seed, i + 100) * w;
      const cpY = y1 + dy * (i - 0.5) + this._srand(seed, i + 150) * w;
      d += ` Q${cpX.toFixed(1)},${cpY.toFixed(1)} ${endX.toFixed(1)},${endY.toFixed(1)}`;
    }
    return d;
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const lines = raw.split('\n').map(s => s.trim()).filter(Boolean);
    const rows = lines.map(line => this._parseLine(line));
    const numCols = Math.max(...rows.map(r => r.length));
    const numRows = rows.length;

    const filename = this.getAttribute('file') || '';
    const seed = 42; // fixed seed for consistent wobble

    // Parse wrap attribute: comma-separated 0-based column indices
    const wrapAttr = this.getAttribute('wrap') || '';
    const wrapCols = new Set(wrapAttr.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n)));

    // Column widths: proportional to max content, with minimum for headers
    const colMaxChars = [];
    for (let c = 0; c < numCols; c++) {
      let max = 0;
      for (const row of rows) {
        const len = (row[c] || '').length;
        if (len > max) max = len;
      }
      colMaxChars.push(Math.max(max, 4));
    }
    const paddedChars = colMaxChars.map(c => c + 3);
    const totalChars = paddedChars.reduce((a, b) => a + b, 0);

    // Layout — generous sizing for slide readability
    const cellPadX = 18;
    const baseCellH = 58;
    const fileTabH = 44;
    const fadeH = 36;
    const insetX = 8;       // horizontal inset so wobble on left/right borders stays visible
    const gridW = Math.max(800, totalChars * 13);
    const totalW = gridW + insetX * 2;
    const colWidths = paddedChars.map(c => (c / totalChars) * gridW);
    const gridTop = fileTabH;

    // Estimate row heights — wrapped columns may need taller rows
    // approx chars per line = (colWidth - 2*cellPadX) / 10 (rough char width at 16pt mono)
    const rowHeights = [];
    for (let r = 0; r < numRows; r++) {
      let maxH = baseCellH;
      for (let c = 0; c < numCols; c++) {
        if (!wrapCols.has(c)) continue;
        const text = rows[r][c] || '';
        const availW = colWidths[c] - 2 * cellPadX;
        const charsPerLine = Math.max(1, Math.floor(availW / 10));
        const lineCount = Math.ceil(text.length / charsPerLine);
        if (lineCount > 1) {
          const neededH = lineCount * 26 + 20; // 26px per line + padding
          if (neededH > maxH) maxH = neededH;
        }
      }
      rowHeights.push(maxH);
    }

    // Cumulative Y offsets for each row
    const rowY = [gridTop];
    for (let r = 0; r < numRows; r++) {
      rowY.push(rowY[r] + rowHeights[r]);
    }
    const gridH = rowY[numRows] - gridTop;
    const totalH = gridTop + gridH + fadeH;

    // --- SVG wobbly grid lines ---
    let paths = '';
    const thin = 1.5;
    const thick = 2.5;

    const gL = insetX;           // grid left edge
    const gR = insetX + gridW;   // grid right edge

    // Top border
    paths += `<path d="${this._wobbleLine(gL, gridTop, gR, gridTop, seed + 1, 5)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Header separator
    const hSepY = rowY[1];
    paths += `<path d="${this._wobbleLine(gL, hSepY, gR, hSepY, seed + 2, 5)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Internal horizontal lines
    for (let r = 2; r <= numRows; r++) {
      const y = rowY[r];
      paths += `<path d="${this._wobbleLine(gL + 2, y, gR - 2, y, seed + r + 10, 4)}"
        fill="none" stroke="#091A31" stroke-width="${thin}" opacity="0.4"/>`;
    }

    // Left border
    paths += `<path d="${this._wobbleLine(gL + 1, gridTop, gL + 1, gridTop + gridH + fadeH, seed + 100, 4)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Right border
    paths += `<path d="${this._wobbleLine(gR - 1, gridTop, gR - 1, gridTop + gridH + fadeH, seed + 101, 4)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Internal vertical lines
    let x = gL;
    for (let c = 1; c < numCols; c++) {
      x += colWidths[c - 1];
      paths += `<path d="${this._wobbleLine(x, gridTop + 2, x, gridTop + gridH + fadeH, seed + c + 200, 3.5)}"
        fill="none" stroke="#091A31" stroke-width="${thin}" opacity="0.4"/>`;
    }

    // Header background (straight rect — wobble is on lines, not fills)
    const headerBg = `<rect x="${gL + 2}" y="${gridTop + 2}" width="${gridW - 4}" height="${rowHeights[0] - 3}"
      fill="#EBF6FF" rx="0"/>`;

    // --- Text cells (crisp, no filter) ---
    let cells = '';
    for (let r = 0; r < numRows; r++) {
      let cx = 0;
      for (let c = 0; c < numCols; c++) {
        const y = rowY[r];
        const h = rowHeights[r];
        const text = rows[r][c] || '';
        const isHeader = r === 0;
        const shouldWrap = wrapCols.has(c) && !isHeader;
        cells += `<div style="position:absolute; left:${cx + insetX}px; top:${y}px; width:${colWidths[c]}px; height:${h}px;
          display:flex; align-items:center; padding:0 ${cellPadX}px; box-sizing:border-box;
          font-family:'Roboto Mono',monospace; font-size:${isHeader ? '17pt' : '16pt'};
          font-weight:${isHeader ? '700' : '400'}; color:#091A31;
          overflow:hidden;${shouldWrap
            ? ' white-space:normal; word-break:break-word; line-height:1.4;'
            : ' white-space:nowrap; text-overflow:ellipsis;'}">${text}</div>`;
        cx += colWidths[c];
      }
    }

    // File tab label
    const fileLabel = filename
      ? `<div style="position:absolute; left:${insetX + 4}px; top:8px;
          font-family:'Roboto Mono',monospace; font-size:15pt; font-weight:600;
          color:#888; letter-spacing:0.02em;">${filename}</div>`
      : '';

    // Gradient mask: solid through data, fading at the bottom
    const solidPct = ((gridTop + gridH - fadeH) / totalH * 100).toFixed(0);

    // Wrap in a scaling container that shrinks the component to fit the slide
    const uid = Math.random().toString(36).slice(2, 8);
    const innerId = `csv-inner-${uid}`;
    const outerId = `csv-outer-${uid}`;

    this.innerHTML = `
      <div id="${outerId}" style="width:100%; margin:1em 0; overflow:visible;">
        <div id="${innerId}" style="position:relative; width:${totalW}px; height:${totalH}px;
          transform-origin:top left;
          -webkit-mask-image:linear-gradient(to bottom, black 0%, black ${solidPct}%, transparent 100%);
          mask-image:linear-gradient(to bottom, black 0%, black ${solidPct}%, transparent 100%);">
          <svg width="${totalW + 4}" height="${totalH + 4}"
            style="position:absolute; top:-2px; left:-2px; pointer-events:none; overflow:visible;">
            ${headerBg}
            ${paths}
          </svg>
          ${fileLabel}
          ${cells}
        </div>
      </div>
    `;

    // Scale to fit available space — may need to re-run when slide becomes visible
    const rescale = () => {
      const outer = document.getElementById(outerId);
      const inner = document.getElementById(innerId);
      if (!outer || !inner) return;
      const avail = outer.clientWidth;
      if (avail === 0) return; // slide still hidden, skip
      if (totalW > avail) {
        const scale = avail / totalW;
        inner.style.transform = `scale(${scale})`;
        inner.style.height = `${totalH * scale}px`;
      } else {
        inner.style.transform = '';
        inner.style.height = `${totalH}px`;
      }
    };

    requestAnimationFrame(rescale);

    // Re-measure when the container becomes visible or resizes.
    // ResizeObserver fires when the slide transitions from hidden (0 width)
    // to visible — works regardless of whether reveal.js has loaded yet.
    const ro = new ResizeObserver(() => requestAnimationFrame(rescale));
    ro.observe(document.getElementById(outerId));

    this._rendered = true;
  }
}

customElements.define('cli-csv', CliCsv);


/**
 * <cli-fanout> — Fan-out/fan-in diagram showing parallel subagent delegation.
 *
 * Usage in markdown:
 *   <cli-fanout input="Main agent" output="Results merged">
 *     Subagent: scrape source A
 *     Subagent: scrape source B
 *     Subagent: clean existing data
 *   </cli-fanout>
 *
 *   <cli-fanout input="Main agent" output="Step 3: combine">
 *     Subagent: code chunk 1
 *     Subagent: code chunk 2
 *     Subagent: code chunk 3
 *   </cli-fanout>
 *
 * Attributes:
 *   input       — label for the left (source) box
 *   output      — label for the right (sink) box
 *   input-color — background for input box (default: "#56ABE1")
 *   output-color — background for output box (default: "#2EC4B6")
 *
 * Text content:
 *   One line per parallel task. Each becomes a middle box.
 */
class CliFanout extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['input', 'output', 'input-color', 'output-color'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const tasks = raw.split('\n').map(s => s.trim()).filter(Boolean);
    const inputLabel = this.getAttribute('input') || 'Input';
    const outputLabel = this.getAttribute('output') || 'Output';
    const inputColor = this.getAttribute('input-color') || '#56ABE1';
    const outputColor = this.getAttribute('output-color') || '#2EC4B6';

    // Unique IDs per instance
    const uid = Math.random().toString(36).slice(2, 8);

    // Layout constants
    const boxW = 220;
    const boxH = 80;
    const taskW = 360;
    const taskH = 56;
    const taskGap = 18;
    const arrowGap = 80;

    const n = tasks.length;
    const tasksBlockH = n * taskH + (n - 1) * taskGap;
    const totalH = Math.max(tasksBlockH, boxH) + 40;

    const inputX = 0;
    const inputY = (totalH - boxH) / 2;
    const taskX = boxW + arrowGap;
    const taskStartY = (totalH - tasksBlockH) / 2;
    const outputX = taskX + taskW + arrowGap;
    const outputY = (totalH - boxH) / 2;
    const totalW = outputX + boxW;

    // SVG arrow paths
    const inputCx = inputX + boxW;
    const inputCy = inputY + boxH / 2;
    const outputCx = outputX;
    const outputCy = outputY + boxH / 2;

    let arrows = '';
    for (let i = 0; i < n; i++) {
      const ty = taskStartY + i * (taskH + taskGap) + taskH / 2;

      // Fan-out: curved bezier from input to task
      const cp1 = arrowGap * 0.55;
      arrows += `<path d="M${inputCx},${inputCy} C${inputCx + cp1},${inputCy} ${taskX - cp1},${ty} ${taskX},${ty}"
        fill="none" stroke="#091A31" stroke-width="2.5" marker-end="url(#arr-${uid})"/>`;

      // Fan-in: curved bezier from task to output
      const tx2 = taskX + taskW;
      arrows += `<path d="M${tx2},${ty} C${tx2 + cp1},${ty} ${outputCx - cp1},${outputCy} ${outputCx},${outputCy}"
        fill="none" stroke="#091A31" stroke-width="2.5" marker-end="url(#arr-${uid})"/>`;
    }

    // Task boxes — light blue-pale fill, subtle rounded border
    const taskBoxes = tasks.map((t, i) => {
      const ty = taskStartY + i * (taskH + taskGap);
      return `<div style="position:absolute; left:${taskX}px; top:${ty}px; width:${taskW}px; height:${taskH}px;
        display:flex; align-items:center; justify-content:center;
        background:#EBF6FF; border:2.5px solid #B6DEFF; border-radius:10px;
        font-size:19pt; color:#091A31; text-align:center; padding:0 20px; box-sizing:border-box;">${t}</div>`;
    }).join('\n');

    // Endpoint boxes — solid color, rounded, white monospace text
    const renderBox = (x, y, color, label) => {
      return `<div style="position:absolute; left:${x}px; top:${y}px; width:${boxW}px; height:${boxH}px;
        display:flex; align-items:center; justify-content:center;
        background:${color}; border-radius:12px;
        font-family:'Roboto Mono',monospace; font-weight:600; font-size:21pt;
        color:white; text-align:center; white-space:pre-line; padding:0 20px; box-sizing:border-box;
        box-shadow:0 3px 12px rgba(9,26,49,0.12);">${label}</div>`;
    };

    this.innerHTML = `
      <svg width="0" height="0" style="position:absolute;">
        <defs>
          <marker id="arr-${uid}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#091A31"/>
          </marker>
        </defs>
      </svg>
      <div style="position:relative; width:${totalW}px; height:${totalH}px; margin:1em auto;">
        <svg width="${totalW}" height="${totalH}" style="position:absolute; top:0; left:0; pointer-events:none;">
          ${arrows}
        </svg>
        ${renderBox(inputX, inputY, inputColor, inputLabel)}
        ${taskBoxes}
        ${renderBox(outputX, outputY, outputColor, outputLabel)}
      </div>
    `;

    this._rendered = true;
  }
}

/**
 * <cli-heatmap> — Presence grid with column headers and row labels.
 *
 * Usage in markdown:
 *   <cli-heatmap columns="Define, Find, Get, Verify, Clean, Analyse, Present"
 *                highlight="Get, Clean">
 *     Human only:    ●, ●, ,  ●, ,  ●, ●
 *     AI can help:   ●, ●, ●, ●, ●, ●, ●
 *     AI can do it:  , ,  ●, ,  ●, ,
 *   </cli-heatmap>
 *
 * Attributes:
 *   columns    — comma-separated column header names
 *   highlight  — comma-separated column names to highlight (darker blue header)
 *   row-label-width — CSS width for the row label column (default: "200px")
 *
 * Text content:
 *   One line per row. Format: "Row Label: cell1, cell2, cell3, ..."
 *   Non-empty cells get a dot (●). Empty cells are blank.
 *   Dot color matches the column header color (highlighted or not).
 *
 * Row label colors cycle through the CLI palette:
 *   row 0 → navy (#091A31), row 1 → blue (#56ABE1), row 2 → gold (#D4A843),
 *   row 3 → purple (#6B4C9A), row 4 → cyan (#2EC4B6), then repeats.
 */
class CliHeatmap extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['columns', 'highlight', 'row-label-width'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const columns = (this.getAttribute('columns') || '').split(',').map(s => s.trim()).filter(Boolean);
    const highlightAttr = (this.getAttribute('highlight') || '').toLowerCase();
    const highlighted = new Set(highlightAttr.split(',').map(s => s.trim().toLowerCase()).filter(Boolean));
    const labelWidth = this.getAttribute('row-label-width') || '200px';

    // Parse rows from text content
    const rows = raw.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
      const colonIdx = line.indexOf(':');
      if (colonIdx < 0) return null;
      const label = line.substring(0, colonIdx).trim();
      const cells = line.substring(colonIdx + 1).split(',').map(c => c.trim());
      return { label, cells };
    }).filter(Boolean);

    const rowLabelColors = ['#091A31', '#56ABE1', '#D4A843', '#6B4C9A', '#2EC4B6'];
    const gap = '4px';

    // Column headers with downward caret
    const headers = columns.map(name => {
      const isHL = highlighted.has(name.toLowerCase());
      const bg = isHL ? '#56ABE1' : '#B6DEFF';
      const color = isHL ? 'white' : '#091A31';
      return `<div style="flex:1; display:flex; flex-direction:column; align-items:center;">
        <div style="background:${bg}; color:${color}; font-weight:600; font-size:24pt; padding:18px 0; width:100%; text-align:center; border-radius:6px 6px 0 0;">${name}</div>
        <div style="width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:14px solid ${bg};"></div>
      </div>`;
    }).join('\n');

    // Data rows
    const dataRows = rows.map((row, ri) => {
      const bgColor = rowLabelColors[ri % rowLabelColors.length];
      const isFirst = ri === 0;
      const isLast = ri === rows.length - 1;
      const labelRadius = isFirst ? 'border-radius:6px 0 0 0;' : isLast ? 'border-radius:0 0 0 6px;' : '';

      const cellsHtml = columns.map((col, ci) => {
        const val = (row.cells[ci] || '').trim();
        const isHL = highlighted.has(col.toLowerCase());
        const dotColor = isHL ? '#56ABE1' : '#091A31';
        const dot = val ? `<span style="color:${dotColor};">●</span>` : '';
        return `<div style="flex:1; background:#EBF6FF; padding:40px 0; text-align:center; font-size:28pt;">${dot}</div>`;
      }).join('\n');

      return `<div style="display:flex; gap:${gap}; margin-top:${gap};">
        <div style="flex:0 0 ${labelWidth}; background:${bgColor}; color:white; font-weight:600; font-size:24pt; display:flex; align-items:center; padding:0 24px; ${labelRadius}">${row.label}</div>
        ${cellsHtml}
      </div>`;
    }).join('\n');

    this.innerHTML = `
      <div style="width:92%; margin:1.2em auto 1.6em;">
        <div style="display:flex; gap:${gap};">
          <div style="flex:0 0 ${labelWidth};"></div>
          ${headers}
        </div>
        ${dataRows}
      </div>
    `;

    this._rendered = true;
  }
}

customElements.define('cli-heatmap', CliHeatmap);

/**
 * <cli-highlight> — Generic text with colour-coded inline highlights and optional legend.
 *
 * Wraps text sections in pastel-coloured spans using curly-brace tags.
 * Colours and legend labels are defined via the `colors` attribute as
 * a pipe-separated list of "tag:label:#hex" entries.
 *
 * Usage in markdown:
 *   <cli-highlight colors="pro:Advantage:#4CAF50 | con:Disadvantage:#F44336 | note:Note:#FF9800">
 *     This tool has {pro}excellent performance{/pro} but {con}limited documentation{/con}.
 *     {note}A community guide exists.{/note}
 *   </cli-highlight>
 *
 * Attributes:
 *   colors    — pipe-separated definitions: "tag:Label:#hex | tag:Label:#hex"
 *               The hex colour is used at 0.3 opacity for highlights.
 *   no-legend — if present, hides the legend below the text
 *   no-quotes — if present, omits the guillemets around the text
 */
class CliHighlight extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  _render() {
    this._rendered = true;

    const colorDefs = (this.getAttribute('colors') || '').split('|').map(s => s.trim()).filter(Boolean);
    const tags = {};

    for (const def of colorDefs) {
      const parts = def.split(':').map(s => s.trim());
      if (parts.length >= 3) {
        const [tag, label, hex] = parts;
        // Convert hex to rgba at 0.3 opacity
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        tags[tag] = { label, color: `rgba(${r},${g},${b},0.3)` };
      }
    }

    let raw = this.textContent.trim();
    let html = raw;

    for (const [tag, { color }] of Object.entries(tags)) {
      const openRe = new RegExp(`\\{${tag}\\}`, 'g');
      const closeRe = new RegExp(`\\{/${tag}\\}`, 'g');
      html = html.replace(openRe, `<span style="background:${color}; padding:4px 10px; border-radius:4px;">`);
      html = html.replace(closeRe, '</span>');
    }

    html = html.replace(/\s+/g, ' ').trim();

    const showLegend = !this.hasAttribute('no-legend');
    const showQuotes = !this.hasAttribute('no-quotes');

    const prefix = showQuotes ? '\u00AB\u00A0' : '';
    const suffix = showQuotes ? '\u00A0\u00BB' : '';

    let legendHtml = '';
    if (showLegend && Object.keys(tags).length > 0) {
      const items = Object.values(tags).map(({ label, color }) =>
        `<span style="background:${color}; padding:4px 10px; border-radius:4px; font-size:0.7em;">${label}</span>`
      ).join(' ');
      legendHtml = `<div style="margin-top:12px; display:flex; gap:24px; justify-content:center;">${items}</div>`;
    }

    this.innerHTML = `
      <div style="background:#f5f5f5; padding:30px 40px; border-radius:12px; font-size:0.85em; margin:20px 0;">
        <p style="line-height:2.2 !important; margin:0;">${prefix}${html}${suffix}</p>
      </div>
      ${legendHtml}
    `;
  }
}

customElements.define('cli-highlight', CliHighlight);


/**
 * <cli-pipeline> — Custom element for data pipeline chevron diagrams.
 *
 * Usage in markdown:
 *   <cli-pipeline highlight="Get">Define, Find, Get, Verify, Clean, Analyse, Present</cli-pipeline>
 *   <cli-pipeline highlight="Clean, Present">Define, Find, Get, Verify, Clean, Analyse, Present</cli-pipeline>
 *   <cli-pipeline>Define, Find, Get, Verify, Clean</cli-pipeline>
 *
 * Attributes:
 *   highlight  — comma-separated step names to highlight (darker blue, white text)
 *   caption    — per-step annotations, pipe-separated. Format:
 *                "StepName: annotation text | StepName: annotation text"
 *                If no step prefix, annotation is placed under the highlighted group.
 *                Text wraps naturally. A vertical line connects each annotation to its step.
 *
 * Examples:
 *   caption="Get: Manual PDF parsing replaced by LLM extraction"
 *   caption="Clean: AI summarises transcripts | Present: Generates email digests"
 *   caption="Both steps use constrained AI"   (no prefix — centered under highlights)
 */
class CliPipeline extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['highlight', 'caption'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  disconnectedCallback() {
    if (this._observer) { this._observer.disconnect(); this._observer = null; }
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const steps = raw.split(',').map(s => s.trim()).filter(Boolean);
    const highlightAttr = (this.getAttribute('highlight') || '').toLowerCase();
    const highlighted = new Set(
      highlightAttr.split(',').map(s => s.trim().toLowerCase()).filter(Boolean)
    );
    const captionAttr = this.getAttribute('caption') || '';

    // Clip-path polygons
    const firstClip = 'polygon(0 0,calc(100% - 20px) 0,100% 50%,calc(100% - 20px) 100%,0 100%)';
    const restClip = 'polygon(0 0,calc(100% - 20px) 0,100% 50%,calc(100% - 20px) 100%,0 100%,20px 50%)';

    const highlightedIndices = [];

    const blocks = steps.map((name, i) => {
      const isHighlighted = highlighted.has(name.toLowerCase());
      if (isHighlighted) highlightedIndices.push(i);
      const clip = i === 0 ? firstClip : restClip;
      const bg = isHighlighted ? '#56ABE1' : '#B6DEFF';
      const color = isHighlighted ? 'white' : '#091A31';
      const weight = isHighlighted ? '700' : '600';
      const size = isHighlighted ? '22pt' : '20pt';
      const padLeft = i === 0 ? '32px' : '44px';

      return `<div style="background:${bg}; clip-path:${clip}; padding:24px 48px 24px ${padLeft}; text-align:center; font-family:'Roboto Mono',monospace; font-weight:${weight}; font-size:${size}; color:${color}; white-space:nowrap;">${name}</div>`;
    }).join('\n');

    this.innerHTML = `
      <div style="position:relative; margin:1.5em 0;">
        <div class="cli-pipeline-row" style="display:flex; align-items:center; justify-content:center; gap:6px;">
          ${blocks}
        </div>
      </div>
    `;

    // Parse and position captions after layout
    const captions = this._parseCaptions(captionAttr);
    if (captions.length > 0) {
      requestAnimationFrame(() => this._positionCaptions(captions, steps, highlightedIndices));
    }

    this._rendered = true;
  }

  _parseCaptions(attr) {
    if (!attr) return [];
    return attr.split('|').map(part => {
      part = part.trim();
      const colonIdx = part.indexOf(':');
      if (colonIdx > 0) {
        const step = part.substring(0, colonIdx).trim();
        const text = part.substring(colonIdx + 1).trim();
        return { step: step.toLowerCase(), text };
      }
      // No prefix — will be placed under the highlighted group
      return { step: null, text: part };
    }).filter(c => c.text);
  }

  _positionCaptions(captions, steps, highlightedIndices) {
    const row = this.querySelector('.cli-pipeline-row');
    if (!row) return;

    const blocks = row.children;
    const rowRect = row.getBoundingClientRect();

    // If the slide is not visible yet (reveal.js hides inactive slides),
    // getBoundingClientRect() returns zeros. Defer until visible.
    if (rowRect.width === 0) {
      if (this._observer) this._observer.disconnect();
      this._observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          this._observer.disconnect();
          this._observer = null;
          this._positionCaptions(captions, steps, highlightedIndices);
        }
      });
      this._observer.observe(this);
      return;
    }

    const container = row.parentElement;
    container.style.overflow = 'visible';

    // Remove any previously positioned caption/line elements
    container.querySelectorAll('.cli-caption, .cli-caption-line').forEach(el => el.remove());

    // reveal.js scales slides via CSS transform. getBoundingClientRect()
    // returns screen pixels (post-scale), but absolute positioning uses
    // the container's local CSS pixels (pre-scale). Compute the ratio.
    const scale = rowRect.width / row.offsetWidth;

    // First pass: resolve each caption's anchor X in local CSS pixels
    const resolved = [];
    for (const caption of captions) {
      let anchorX;
      if (caption.step) {
        const stepIdx = steps.findIndex(s => s.toLowerCase() === caption.step);
        if (stepIdx < 0) continue;
        const blockRect = blocks[stepIdx].getBoundingClientRect();
        anchorX = ((blockRect.left + blockRect.right) / 2 - rowRect.left) / scale;
      } else {
        if (highlightedIndices.length === 0) continue;
        const firstRect = blocks[highlightedIndices[0]].getBoundingClientRect();
        const lastRect = blocks[highlightedIndices[highlightedIndices.length - 1]].getBoundingClientRect();
        anchorX = ((firstRect.left + lastRect.right) / 2 - rowRect.left) / scale;
      }
      resolved.push({ ...caption, anchorX });
    }

    // Sort by position so we can calculate available width between captions
    resolved.sort((a, b) => a.anchorX - b.anchorX);

    // Wrapping rule: each caption's max-width is ~2 step-widths,
    // capped by the space before the next caption so they never overlap.
    // This keeps wrapping consistent whether there's 1 caption or 5.
    const rowWidth = row.offsetWidth;
    const stepWidth = rowWidth / steps.length;
    const naturalWidth = stepWidth;

    const lineW = 3;

    for (let i = 0; i < resolved.length; i++) {
      const { anchorX, text } = resolved[i];

      const nextAnchorX = i < resolved.length - 1 ? resolved[i + 1].anchorX : rowWidth;
      const maxWidth = Math.min(naturalWidth, nextAnchorX - anchorX - 24);

      // Left edge aligned: both the vertical line and the caption border-left
      // start at the same x so there's no visual break
      const lineLeft = anchorX - lineW / 2;

      // Vertical connector line — starts 2px inside the chevron so there's
      // no visible gap between the block and the line
      const line = document.createElement('div');
      line.className = 'cli-caption-line';
      line.style.cssText = `position:absolute; left:${lineLeft}px; top:calc(100% - 2px); width:${lineW}px; height:26px; background:#56ABE1;`;
      container.appendChild(line);

      // Caption text with left border continuing the line seamlessly
      const captionEl = document.createElement('div');
      captionEl.className = 'cli-caption';
      captionEl.style.cssText = `position:absolute; left:${lineLeft}px; top:calc(100% + 24px); box-sizing:border-box; border-left:${lineW}px solid #56ABE1; padding:2px 0 2px 14px; font-size:18pt; color:#888; max-width:${maxWidth}px; line-height:1.4;`;
      captionEl.textContent = text;
      container.appendChild(captionEl);
    }

    // After layout, measure actual caption heights and reserve generous
    // margin so subsequent content has clear separation from captions
    requestAnimationFrame(() => {
      const containerRect = container.getBoundingClientRect();
      let maxBottom = 0;
      container.querySelectorAll('.cli-caption').forEach(el => {
        const r = el.getBoundingClientRect();
        const bottom = r.bottom - containerRect.top;
        if (bottom > maxBottom) maxBottom = bottom;
      });
      container.style.marginBottom = `${maxBottom - containerRect.height + 72}px`;
    });

    // Default margin before measurement completes
    container.style.marginBottom = '120px';
  }
}

customElements.define('cli-pipeline', CliPipeline);


/**
 * <cli-quadrant> — 2×2 quadrant diagram with labeled axes.
 *
 * Usage in markdown:
 *   <cli-quadrant x-label="Representation" y-label="Structure"
 *     tl="Erroneous data | hallucination | #D4A843"
 *     tr="Good data || #2EC4B6"
 *     bl="Useless data || #CC0000"
 *     br="Messy data || #6B4C9A">
 *   </cli-quadrant>
 *
 * Attributes:
 *   x-label  — label for the horizontal axis (right arrow)
 *   y-label  — label for the vertical axis (up arrow)
 *   tl       — top-left quadrant: "Title | Subtitle | Color"
 *   tr       — top-right quadrant: "Title | Subtitle | Color"
 *   bl       — bottom-left quadrant: "Title | Subtitle | Color"
 *   br       — bottom-right quadrant: "Title | Subtitle | Color"
 *   size     — overall size in px (default: "540")
 *
 * Each quadrant value is pipe-separated: "Title | Subtitle | #hexcolor"
 * Subtitle and color are optional. Default color is #56ABE1.
 */
class CliQuadrant extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['x-label', 'y-label', 'tl', 'tr', 'bl', 'br', 'size'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _parseQuadrant(attr) {
    if (!attr) return null;
    const parts = attr.split('|').map(s => s.trim());
    return {
      title: parts[0] || '',
      subtitle: parts[1] || '',
      color: parts[2] || '#56ABE1'
    };
  }

  _render() {
    const xLabel = this.getAttribute('x-label') || '';
    const yLabel = this.getAttribute('y-label') || '';
    const size = parseInt(this.getAttribute('size') || '540', 10);

    const quadrants = {
      tl: this._parseQuadrant(this.getAttribute('tl')),
      tr: this._parseQuadrant(this.getAttribute('tr')),
      bl: this._parseQuadrant(this.getAttribute('bl')),
      br: this._parseQuadrant(this.getAttribute('br'))
    };

    // Symmetric layout from axis crossing point
    const gap = 36;          // breathing room between boxes and axis
    const pad = 10;          // outer padding around quadrant area
    const arrowExt = 20;     // how far arrows extend past boxes
    const topMar = 36;       // space above boxes for arrow + label

    // Axis crossing point — center of the box area (topMar to size-pad)
    const crossX = size / 2;
    const crossY = topMar + (size - pad - topMar) / 2;

    // Quadrant box dimensions
    const qW = crossX - pad - gap / 2;
    const qH = (size - pad - topMar - gap) / 2;

    // Diagonal stripes: semi-transparent color alternating with white
    const stripes = (color) => {
      return `repeating-linear-gradient(45deg, ${color}99 0px, ${color}99 10px, white 10px, white 20px)`;
    };

    // Unique filter ID per instance to avoid collisions
    const filterId = `wobble-${Math.random().toString(36).slice(2, 8)}`;

    const renderQ = (q, top, left) => {
      if (!q) return '';
      const subtitle = q.subtitle ? `<div style="color:#091A31; font-size:14pt; margin-top:2px; font-style:italic;">${q.subtitle}</div>` : '';
      return `<div style="position:absolute; left:${left}px; top:${top}px; width:${qW}px; height:${qH}px; display:flex; align-items:center; justify-content:center; flex-direction:column; box-sizing:border-box;">
        <div style="position:absolute; inset:-6px; background:${stripes(q.color)}; filter:url(#${filterId});"></div>
        <div style="position:relative; background:rgba(255,255,255,0.85); padding:8px 16px; border-radius:6px; text-align:center;">
          <div style="color:#091A31; font-weight:700; font-size:18pt; line-height:1.3;">${q.title}</div>
          ${subtitle}
        </div>
      </div>`;
    };

    // Quadrant positions
    const tlLeft = pad;
    const tlTop = topMar;
    const trLeft = crossX + gap / 2;
    const trTop = topMar;
    const blLeft = pad;
    const blTop = crossY + gap / 2;
    const brLeft = crossX + gap / 2;
    const brTop = crossY + gap / 2;

    // Total dimensions
    const totalW = size + arrowExt + 14;
    const totalH = size + 36;

    this.innerHTML = `
      <svg width="0" height="0" style="position:absolute;">
        <filter id="${filterId}">
          <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="2" result="turbulence"/>
          <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="10" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </svg>
      <div style="position:relative; width:${totalW}px; height:${totalH}px; overflow:visible;">
        <!-- Y axis -->
        <div style="position:absolute; left:${crossX}px; top:6px; height:${size - 6}px; width:3px; background:#091A31;"></div>
        <!-- X axis -->
        <div style="position:absolute; top:${crossY}px; left:0; width:${size + arrowExt}px; height:3px; background:#091A31;"></div>
        <!-- Y arrow -->
        <div style="position:absolute; left:${crossX - 7}px; top:-2px; width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent; border-bottom:14px solid #091A31;"></div>
        <!-- X arrow -->
        <div style="position:absolute; left:${size + arrowExt}px; top:${crossY - 7}px; width:0; height:0; border-top:9px solid transparent; border-bottom:9px solid transparent; border-left:14px solid #091A31;"></div>
        <!-- Y label -->
        <div style="position:absolute; left:${crossX + 16}px; top:0; font-family:var(--font-title); font-size:17pt; font-weight:600; color:#56ABE1; white-space:nowrap;">${yLabel}</div>
        <!-- X label -->
        <div style="position:absolute; right:0; top:${size + 8}px; font-family:var(--font-title); font-size:17pt; font-weight:600; color:#56ABE1; white-space:nowrap;">${xLabel}</div>
        <!-- Quadrants -->
        ${renderQ(quadrants.tl, tlTop, tlLeft)}
        ${renderQ(quadrants.tr, trTop, trLeft)}
        ${renderQ(quadrants.bl, blTop, blLeft)}
        ${renderQ(quadrants.br, brTop, brLeft)}
      </div>
    `;

    this._rendered = true;
  }
}

customElements.define('cli-quadrant', CliQuadrant);

</script>

<script>
  Reveal.initialize({
    width: 1920,
    height: 1080,
    margin: 0,
    minScale: 0.2,
    maxScale: 2.0,
    center: false,
    display: 'flex',
    hash: true,
    transition: 'fade',
    transitionSpeed: 'fast',
    pdfSeparateFragments: false,
    plugins: [RevealMarkdown, RevealNotes, RevealHighlight]
  });

  // Post-processor: add content-slide class to slides without an explicit type
  Reveal.on('ready', () => {
    const typeClasses = ['title-slide', 'section-slide', 'subsection-slide', 'toc-slide'];
    document.querySelectorAll('.slides > section > section, .slides > section[data-markdown-parsed]').forEach(section => {
      if (!typeClasses.some(c => section.classList.contains(c))) {
        section.classList.add('content-slide');
      }
    });
    updateFooter();
  });

  // Footer visibility and slide number
  const globalFooter = document.querySelector('.global-footer');
  const slideNumberEl = document.querySelector('.global-footer .page-number');
  const darkClasses = ['title-slide', 'section-slide', 'subsection-slide'];

  // Hide footer entirely in speaker view iframes (prevents overlap in preview)
  if (new URLSearchParams(window.location.search).has('receiver')) {
    if (globalFooter) globalFooter.style.display = 'none';
  }

  function updateFooter() {
    if (!globalFooter) return;
    const slide = Reveal.getCurrentSlide();
    const isDark = darkClasses.some(c => slide.classList.contains(c));
    globalFooter.classList.toggle('hidden', isDark);
    slideNumberEl.textContent = Reveal.getSlidePastCount() + 1;
  }

  Reveal.on('slidechanged', updateFooter);
</script>

</body>
